<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Schuldenabbau"/>
  <meta name="theme-color" content="#020817"/>
  <title>Schuldenabbau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #020817; font-family: 'Sora', sans-serif; color: #f1f5f9; }
    input, select, button, textarea { font-family: 'Sora', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Layout ── */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    #header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-bottom: 1px solid #1e293b;
      padding: 14px 18px;
      position: sticky; top: 0; z-index: 50;
    }
    #header-inner { max-width: 720px; margin: 0 auto; }
    #header-top { display: flex; justify-content: space-between; align-items: center; }
    #app-title { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; }
    #app-sub   { font-size: 11px; color: #64748b; margin-top: 2px; }
    #tab-bar   { display: flex; gap: 4px; margin-top: 14px; flex-wrap: wrap; }

    .tab-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 10px; border: none;
      cursor: pointer; font-weight: 600; font-size: 13px;
      transition: all 0.2s; background: transparent; color: #64748b;
    }
    .tab-btn.active { background: #3b82f6; color: #fff; }
    .tab-btn svg { flex-shrink: 0; }

    /* ── Content ── */
    #content { max-width: 720px; margin: 0 auto; padding: 20px 14px; flex: 1; width: 100%; }

    /* ── Cards / Rows ── */
    .card {
      background: #0f172a; border: 1px solid #1e293b;
      border-radius: 16px; padding: 20px;
    }
    .row {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    }
    .section-label {
      font-size: 11px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 10px; border: none;
      cursor: pointer; font-weight: 600; font-size: 13px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-blue   { background: #3b82f6; color: #fff; }
    .btn-green  { background: #10b981; color: #fff; }
    .btn-gray   { background: #1e293b; color: #94a3b8; }
    .btn-sm     { padding: 6px 10px; }
    .icon-btn {
      background: transparent; border: none; cursor: pointer;
      display: inline-flex; align-items: center; padding: 5px; border-radius: 6px;
      color: #64748b; transition: color 0.15s;
    }
    .icon-btn:active { opacity: 0.7; }

    /* ── Inputs ── */
    .field { margin-bottom: 15px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700; color: #94a3b8;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.07em;
    }
    .field input, .field select {
      width: 100%; background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 10px 14px; color: #f1f5f9;
      font-size: 14px; outline: none;
    }
    .field input:focus, .field select:focus { border-color: #3b82f6; }
    .field select option { background: #1e293b; }

    /* ── Progress bar ── */
    .progress-track {
      background: #1e293b; border-radius: 99px; overflow: hidden; width: 100%;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(5px); display: flex; align-items: center;
      justify-content: center; z-index: 200; padding: 16px;
      animation: fadeIn 0.15s ease;
    }
    .modal-box {
      background: #0f172a; border: 1px solid #1e293b; border-radius: 22px;
      padding: 28px; width: 100%; max-width: 460px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.85);
      animation: fadeUp 0.22s ease;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: #f1f5f9; }

    /* ── Color picker ── */
    .color-swatch {
      width: 26px; height: 26px; border-radius: 99px; border: 3px solid transparent;
      cursor: pointer; transition: border-color 0.15s;
    }
    .color-swatch.selected { border-color: #fff; }

    /* ── Stat number cards ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .stat-card { padding: 12px 14px; border-radius: 16px; background: #0f172a; border: 1px solid #1e293b; }
    .stat-label { font-size: 9px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .stat-value { font-size: 19px; font-weight: 800; }

    /* ── Debt detail bar line ── */
    .pay-line { width: 3px; border-radius: 99px; align-self: stretch; min-height: 30px; flex-shrink: 0; }

    /* ── Empty states ── */
    .empty { text-align: center; padding: 48px 20px; color: #475569; }
    .empty .emoji { font-size: 36px; margin-bottom: 10px; }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid #1e293b; }

    /* ── Badge ── */
    .badge {
      font-size: 10px; background: #10b981; color: #fff;
      border-radius: 99px; padding: 2px 8px; font-weight: 700;
    }

    /* ── Flex helpers ── */
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-center  { display: flex; align-items: center; }
    .gap-6  { gap: 6px; }
    .gap-8  { gap: 8px; }
    .gap-10 { gap: 10px; }
    .gap-12 { gap: 12px; }
    .mt-4  { margin-top: 4px; }
    .mt-6  { margin-top: 6px; }
    .mt-8  { margin-top: 8px; }
    .mt-10 { margin-top: 10px; }
    .mt-14 { margin-top: 14px; }
    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }
    .mt-24 { margin-top: 24px; }
    .mb-4  { margin-bottom: 4px; }
    .mb-10 { margin-bottom: 10px; }
    .mb-14 { margin-bottom: 14px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-18 { margin-bottom: 18px; }
    .hidden { display: none !important; }
    .anim { animation: fadeUp 0.2s ease; }

    /* ── Month chart ── */
    #month-chart { display: flex; align-items: flex-end; gap: 10px; height: 130px; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .chart-bar { width: 100%; border-radius: 5px 5px 0 0; }
    .chart-label { font-size: 9px; color: #64748b; }
    .chart-amount { font-size: 9px; color: #94a3b8; font-weight: 600; }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-inner">
      <div id="header-top">
        <div>
          <div id="app-title">Schuldenabbau</div>
          <div id="app-sub">Dein persönlicher Finanztracker</div>
        </div>
        <button class="btn btn-green" onclick="openPayModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Zahlung
        </button>
      </div>
      <div id="tab-bar">
        <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          Dashboard
        </button>
        <button class="tab-btn" data-tab="debts" onclick="switchTab('debts')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          Schulden
        </button>
        <button class="tab-btn" data-tab="payments" onclick="switchTab('payments')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Zahlungen
        </button>
        <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
          Statistiken
        </button>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  MODALS                                                                -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->

<!-- Debt Modal -->
<div id="debt-modal" class="modal-overlay hidden" onclick="modalOverlayClick(event,'debt-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="debt-modal-title">Neue Schuld</span>
      <button class="icon-btn" onclick="closeDebtModal()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input type="hidden" id="debt-edit-id"/>
    <div class="field"><label>Bezeichnung *</label><input type="text" id="debt-name" placeholder="z.B. Kreditkarte"/></div>
    <div class="field"><label>Gläubiger</label><input type="text" id="debt-creditor" placeholder="z.B. Sparkasse"/></div>
    <div class="field"><label>Gesamtbetrag (€) *</label><input type="number" id="debt-amount" placeholder="0.00" step="0.01"/></div>
    <div class="field"><label>Fälligkeitsdatum</label><input type="date" id="debt-due"/></div>
    <div class="field"><label>Notiz</label><input type="text" id="debt-note" placeholder="Optional…"/></div>
    <div class="field">
      <label>Farbe</label>
      <div id="color-picker" class="flex gap-8" style="flex-wrap:wrap"></div>
    </div>
    <input type="hidden" id="debt-color" value="#3b82f6"/>
    <div class="flex gap-10 mt-6">
      <button class="btn btn-gray" style="flex:1" onclick="closeDebtModal()">Abbrechen</button>
      <button class="btn btn-blue" style="flex:1" onclick="submitDebt()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Pay Modal -->
<div id="pay-modal" class="modal-overlay hidden" onclick="modalOverlayClick(event,'pay-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Zahlung eintragen</span>
      <button class="icon-btn" onclick="closePayModal()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="field"><label>Schuld</label><select id="pay-debt-id"></select></div>
    <div class="field"><label>Betrag (€) *</label><input type="number" id="pay-amount" placeholder="0.00" step="0.01"/></div>
    <div class="field"><label>Datum</label><input type="date" id="pay-date"/></div>
    <div class="field"><label>Notiz</label><input type="text" id="pay-note" placeholder="Optional…"/></div>
    <div class="flex gap-10 mt-6">
      <button class="btn btn-gray" style="flex:1" onclick="closePayModal()">Abbrechen</button>
      <button class="btn btn-green" style="flex:1" onclick="submitPay()">Eintragen</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<script>
// ── Constants ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'schuldenabbau-v2';
const COLORS = ['#3b82f6','#ef4444','#f59e0b','#10b981','#8b5cf6','#ec4899','#06b6d4','#f97316'];

// ── State ─────────────────────────────────────────────────────────────────────
let state = { debts: [], payments: [] };
let currentTab = 'dashboard';
let detailDebtId = null;

// ── Persist ───────────────────────────────────────────────────────────────────
function loadData() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch(_){}
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_){}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function fmt(n) { return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0); }
function fmtDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function paidFor(id) {
  return state.payments.filter(p=>p.debtId===id).reduce((s,p)=>s+p.amount,0);
}
function totalDebt() { return state.debts.reduce((s,d)=>s+d.amount,0); }
function totalPaid() { return state.payments.reduce((s,p)=>s+p.amount,0); }

function progressBar(value, max, color, height=10) {
  const pct = max>0 ? Math.min(100,(value/max)*100) : 0;
  return `<div class="progress-track" style="height:${height}px">
    <div class="progress-fill" style="width:${pct}%;background:${color};box-shadow:0 0 10px ${color}66;height:100%"></div>
  </div>`;
}

function svgIcon(name) {
  const icons = {
    plus:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    trash: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
    edit:  `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
    back:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  };
  return icons[name]||'';
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  if (tab !== 'debts') detailDebtId = null;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  render();
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  el.className = 'anim';
  void el.offsetWidth; // reflow to restart animation
  el.className = '';
  requestAnimationFrame(()=>{
    el.className = 'anim';
    if      (currentTab==='dashboard') el.innerHTML = renderDashboard();
    else if (currentTab==='debts')     el.innerHTML = detailDebtId ? renderDetail(detailDebtId) : renderDebts();
    else if (currentTab==='payments')  el.innerHTML = renderPayments();
    else if (currentTab==='stats')     el.innerHTML = renderStats();
    el.style.maxWidth = '720px';
    el.style.margin = '0 auto';
    el.style.padding = '20px 14px';
  });
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const td=totalDebt(), tp=totalPaid(), rem=Math.max(0,td-tp);
  const pct=td>0?Math.min(100,(tp/td)*100):0;
  const recent=[...state.payments].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  let recentHTML = recent.length===0
    ? `<p style="color:#475569;text-align:center;font-size:13px">Noch keine Zahlungen.</p>`
    : recent.map(p=>{
        const d=state.debts.find(d=>d.id===p.debtId);
        return `<div class="flex-between" style="padding:9px 0;border-bottom:1px solid #1e293b">
          <div>
            <div style="font-size:13px;font-weight:600;color:#f1f5f9">${d?d.name:'–'}</div>
            <div style="font-size:11px;color:#64748b">${fmtDate(p.date)}${p.note?' · '+p.note:''}</div>
          </div>
          <div style="font-weight:700;color:#10b981;font-size:13px">+${fmt(p.amount)}</div>
        </div>`;
      }).join('');

  let debtsHTML = state.debts.length===0
    ? `<p style="color:#475569;text-align:center;font-size:13px;padding:12px 0">Noch keine Schulden.</p>`
    : state.debts.map(d=>{
        const paid=paidFor(d.id), dpct=d.amount>0?Math.min(100,(paid/d.amount)*100):0, done=paid>=d.amount&&d.amount>0;
        return `<div onclick="openDetail('${d.id}')" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1e293b;cursor:pointer">
          <div style="width:10px;height:10px;border-radius:99px;background:${d.color};flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div class="flex-between" style="margin-bottom:5px">
              <span style="font-size:13px;font-weight:600;color:#f1f5f9">${d.name}</span>
              <span style="font-size:12px;color:${done?'#10b981':d.color};font-weight:700">${done?'✓':dpct.toFixed(0)+'%'}</span>
            </div>
            ${progressBar(paid,d.amount,d.color,6)}
            <div style="font-size:10px;color:#64748b;margin-top:3px">${fmt(paid)} / ${fmt(d.amount)}</div>
          </div>
        </div>`;
      }).join('');

  return `
    <div class="stat-grid">
      ${[['Gesamtschulden',fmt(td),'#ef4444'],['Bezahlt',fmt(tp),'#10b981'],
         ['Verbleibend',fmt(rem),'#f59e0b'],['Fortschritt',pct.toFixed(1)+'%','#3b82f6']]
        .map(([l,v,c])=>`<div class="stat-card" style="border-left:3px solid ${c}">
          <div class="stat-label">${l}</div>
          <div class="stat-value" style="color:${c}">${v}</div>
        </div>`).join('')}
    </div>

    <div class="card mb-16">
      <div class="flex-between mb-10">
        <span style="font-weight:700;color:#f1f5f9">Gesamtfortschritt</span>
        <span style="color:#10b981;font-weight:700">${pct.toFixed(1)}%</span>
      </div>
      ${progressBar(tp,td,'#10b981',12)}
      <div class="flex-between mt-8" style="font-size:11px;color:#64748b">
        <span>${fmt(tp)} bezahlt</span><span>${fmt(rem)} offen</span>
      </div>
    </div>

    <div class="card mb-16">
      <div class="flex-between mb-14">
        <h3 style="font-size:14px;font-weight:700;color:#f1f5f9">Schulden auf einen Blick</h3>
        <button class="btn btn-blue" style="padding:6px 12px;font-size:12px" onclick="openDebtModal()">
          ${svgIcon('plus')} Neu
        </button>
      </div>
      ${debtsHTML}
    </div>

    <div class="card">
      <h3 style="font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:14px">Letzte Zahlungen</h3>
      ${recentHTML}
    </div>`;
}

// ── Debts List ────────────────────────────────────────────────────────────────
function renderDebts() {
  const open = state.debts.filter(d=>{ const p=paidFor(d.id); return p<d.amount||d.amount===0; });
  const done = state.debts.filter(d=>paidFor(d.id)>=d.amount&&d.amount>0);

  function debtCard(d) {
    const paid=paidFor(d.id), rest=Math.max(0,d.amount-paid);
    const pct=d.amount>0?Math.min(100,(paid/d.amount)*100):0, isDone=rest===0&&d.amount>0;
    return `<div class="row" style="border-left:4px solid ${d.color};opacity:${isDone?0.8:1}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div onclick="openDetail('${d.id}')" style="flex:1;cursor:pointer">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:15px;font-weight:700;color:#f1f5f9">${d.name}</span>
            ${isDone?`<span class="badge">✓</span>`:''}
          </div>
          ${d.creditor?`<div style="font-size:11px;color:#64748b">${d.creditor}</div>`:''}
          ${d.dueDate?`<div style="font-size:11px;color:#94a3b8">Fällig: ${fmtDate(d.dueDate)}</div>`:''}
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-green btn-sm" onclick="openPayModal('${d.id}')">${svgIcon('plus')}</button>
          <button class="icon-btn" style="color:#94a3b8" onclick="openDebtModal('${d.id}')">${svgIcon('edit')}</button>
          <button class="icon-btn" style="color:#ef4444" onclick="deleteDebt('${d.id}')">${svgIcon('trash')}</button>
        </div>
      </div>
      ${progressBar(paid,d.amount,d.color)}
      <div style="display:flex;justify-content:space-between;margin-top:7px;font-size:12px">
        <span style="color:#10b981">${fmt(paid)} bezahlt</span>
        <span style="color:#94a3b8">${fmt(rest)} offen</span>
        <span style="color:${d.color};font-weight:700">${pct.toFixed(0)}%</span>
      </div>
      <div onclick="openDetail('${d.id}')" style="font-size:11px;color:#3b82f6;margin-top:7px;cursor:pointer">
        Details & Zahlungshistorie →
      </div>
    </div>`;
  }

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-blue" onclick="openDebtModal()">${svgIcon('plus')} Schuld hinzufügen</button>
    </div>
    ${state.debts.length===0?`<div class="empty"><div class="emoji">💳</div>Noch keine Schulden angelegt.</div>`:''}
    ${open.length>0?`<div class="section-label">Offene Schulden (${open.length})</div>${open.map(debtCard).join('')}`:''}
    ${done.length>0?`<div class="section-label mt-24">Abbezahlt (${done.length}) ✓</div>${done.map(debtCard).join('')}`:''}`;
}

// ── Debt Detail ───────────────────────────────────────────────────────────────
function renderDetail(id) {
  const d = state.debts.find(x=>x.id===id);
  if (!d) return renderDebts();
  const payments = [...state.payments.filter(p=>p.debtId===id)].sort((a,b)=>b.date.localeCompare(a.date));
  const paid = payments.reduce((s,p)=>s+p.amount,0);
  const rest = Math.max(0, d.amount-paid);
  const pct  = d.amount>0?Math.min(100,(paid/d.amount)*100):0;
  const done = rest===0&&d.amount>0;

  // monthly
  const monthly={};
  payments.forEach(p=>{ const m=p.date.slice(0,7); monthly[m]=(monthly[m]||0)+p.amount; });
  const months=Object.keys(monthly).sort().slice(-6);
  const maxM=Math.max(...months.map(m=>monthly[m]),1);

  const chartHTML = months.length===0?'' : `
    <div class="card mb-16">
      <h3 style="font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:14px">Monatliche Zahlungen</h3>
      <div style="display:flex;align-items:flex-end;gap:8px;height:100px">
        ${months.map(m=>{
          const h=Math.max(10,(monthly[m]/maxM)*82);
          const label=new Date(m+'-01').toLocaleDateString('de-DE',{month:'short',year:'2-digit'});
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
            <div style="font-size:9px;color:#94a3b8;font-weight:600">${fmt(monthly[m]).replace('€','').trim()}€</div>
            <div style="width:100%;height:${h}px;background:linear-gradient(to top,${d.color},${d.color}88);border-radius:5px 5px 0 0;box-shadow:0 0 10px ${d.color}55"></div>
            <div style="font-size:9px;color:#64748b">${label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  const payHistHTML = payments.length===0
    ? `<div style="text-align:center;padding:24px 0;color:#475569;font-size:13px">Noch keine Zahlungen für diese Schuld.</div>`
    : payments.map((p,i)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;${i<payments.length-1?'border-bottom:1px solid #1e293b':''}">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="width:3px;border-radius:99px;background:${d.color};align-self:stretch;min-height:30px;flex-shrink:0"></div>
          <div>
            <div style="font-size:15px;font-weight:700;color:#10b981">+${fmt(p.amount)}</div>
            <div style="font-size:11px;color:#64748b">${fmtDate(p.date)}${p.note?' · '+p.note:''}</div>
          </div>
        </div>
        <button class="icon-btn" style="color:#ef4444" onclick="deletePayment('${p.id}')">${svgIcon('trash')}</button>
      </div>`).join('');

  return `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap">
      <button class="btn btn-gray" style="padding:8px 14px" onclick="closeDetail()">
        ${svgIcon('back')} Alle Schulden
      </button>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="width:12px;height:12px;border-radius:99px;background:${d.color};flex-shrink:0"></div>
          <span style="font-size:18px;font-weight:800;color:#f1f5f9">${d.name}</span>
          ${done?`<span class="badge">✓ Abbezahlt</span>`:''}
        </div>
        ${d.creditor?`<div style="font-size:12px;color:#64748b;padding-left:22px">${d.creditor}</div>`:''}
      </div>
      <div style="display:flex;gap:6px">
        <button class="icon-btn" style="color:#94a3b8" onclick="openDebtModal('${d.id}')">${svgIcon('edit')}</button>
        <button class="btn btn-green" style="padding:8px 14px" onclick="openPayModal('${d.id}')">
          ${svgIcon('plus')} Zahlung
        </button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      ${[['Gesamtschuld',fmt(d.amount),'#ef4444'],['Bezahlt',fmt(paid),'#10b981'],['Offen',fmt(rest),'#f59e0b']]
        .map(([l,v,c])=>`<div class="stat-card" style="border-left:3px solid ${c};padding:12px 14px">
          <div class="stat-label">${l}</div>
          <div style="font-size:17px;font-weight:800;color:${c}">${v}</div>
        </div>`).join('')}
    </div>

    <div class="card mb-16">
      <div class="flex-between mb-10">
        <span style="font-weight:700;color:#f1f5f9">Fortschritt</span>
        <span style="color:${d.color};font-weight:800;font-size:16px">${pct.toFixed(1)}%</span>
      </div>
      ${progressBar(paid,d.amount,d.color,14)}
      <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;font-size:12px;color:#64748b">
        ${d.dueDate?`<div>📅 Fällig: ${fmtDate(d.dueDate)}</div>`:''}
        ${d.note?`<div>📝 ${d.note}</div>`:''}
        ${d.createdAt?`<div>📌 Erstellt: ${fmtDate(d.createdAt)}</div>`:''}
      </div>
    </div>

    ${chartHTML}

    <div class="card">
      <div class="flex-between mb-14">
        <h3 style="font-size:14px;font-weight:700;color:#f1f5f9">Zahlungshistorie (${payments.length})</h3>
        ${payments.length>0?`<span style="font-size:13px;color:#10b981;font-weight:700">${fmt(paid)} gesamt</span>`:''}
      </div>
      ${payHistHTML}
    </div>`;
}

// ── Payments ──────────────────────────────────────────────────────────────────
function renderPayments() {
  const filterVal = document.getElementById('pay-filter-val') ? document.getElementById('pay-filter-val').value : 'all';
  const debtOptions = state.debts.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');

  const filtered = [...state.payments]
    .filter(p=>filterVal==='all'||p.debtId===filterVal)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const filtTotal = filtered.reduce((s,p)=>s+p.amount,0);

  const rowsHTML = filtered.length===0
    ? `<div class="empty"><div class="emoji">🧾</div>Keine Zahlungen gefunden.</div>`
    : filtered.map(p=>{
        const d=state.debts.find(x=>x.id===p.debtId);
        return `<div class="row">
          <div class="flex-between">
            <div style="display:flex;gap:10px;align-items:flex-start">
              ${d?`<div style="width:3px;border-radius:99px;background:${d.color};align-self:stretch;min-height:30px;flex-shrink:0"></div>`:''}
              <div>
                <div style="font-size:15px;font-weight:700;color:#10b981">+${fmt(p.amount)}</div>
                <div style="font-size:11px;color:#94a3b8">
                  ${d?`<span style="color:${d.color};font-weight:600">${d.name}</span>`:'–'}
                  · ${fmtDate(p.date)}
                </div>
                ${p.note?`<div style="font-size:11px;color:#64748b;font-style:italic">${p.note}</div>`:''}
              </div>
            </div>
            <button class="icon-btn" style="color:#ef4444" onclick="deletePayment('${p.id}')">${svgIcon('trash')}</button>
          </div>
        </div>`;
      }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <select id="pay-filter-val" onchange="render()" style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:9px 14px;color:#f1f5f9;font-size:13px;outline:none;min-width:160px">
        <option value="all">Alle Schulden</option>
        ${debtOptions}
      </select>
      <button class="btn btn-green" onclick="openPayModal()">${svgIcon('plus')} Zahlung eintragen</button>
    </div>
    ${filtered.length>0?`<div class="card mb-10" style="padding:10px 16px">
      <div class="flex-between">
        <span style="font-size:12px;color:#94a3b8">${filtered.length} Einträge</span>
        <span style="font-size:13px;font-weight:700;color:#10b981">${fmt(filtTotal)}</span>
      </div>
    </div>`:''}
    ${rowsHTML}`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const monthly={};
  state.payments.forEach(p=>{ const m=p.date.slice(0,7); monthly[m]=(monthly[m]||0)+p.amount; });
  const months=Object.keys(monthly).sort().slice(-6);
  const maxM=Math.max(...months.map(m=>monthly[m]),1);
  const doneCount=state.debts.filter(d=>paidFor(d.id)>=d.amount&&d.amount>0).length;

  const perDebtHTML = state.debts.length===0
    ? `<p style="color:#475569;text-align:center">Keine Daten.</p>`
    : state.debts.map(d=>{
        const paid=paidFor(d.id), pct=d.amount>0?Math.min(100,(paid/d.amount)*100):0;
        return `<div style="margin-bottom:14px;cursor:pointer" onclick="openDetail('${d.id}')">
          <div class="flex-between" style="margin-bottom:5px">
            <div style="display:flex;align-items:center;gap:7px">
              <div style="width:8px;height:8px;border-radius:99px;background:${d.color}"></div>
              <span style="font-size:13px;font-weight:600;color:#f1f5f9">${d.name}</span>
            </div>
            <span style="font-size:12px;color:${d.color};font-weight:700">${pct.toFixed(0)}%</span>
          </div>
          ${progressBar(paid,d.amount,d.color,8)}
          <div style="font-size:10px;color:#64748b;margin-top:3px">${fmt(paid)} / ${fmt(d.amount)}</div>
        </div>`;
      }).join('');

  const chartHTML = months.length===0
    ? `<p style="color:#475569;text-align:center">Noch keine Zahlungen.</p>`
    : `<div style="display:flex;align-items:flex-end;gap:10px;height:130px">
        ${months.map(m=>{
          const h=Math.max(12,(monthly[m]/maxM)*108);
          const label=new Date(m+'-01').toLocaleDateString('de-DE',{month:'short',year:'2-digit'});
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
            <div style="font-size:9px;color:#94a3b8;font-weight:600">${fmt(monthly[m]).replace('€','').trim()}€</div>
            <div style="width:100%;height:${h}px;background:linear-gradient(to top,#3b82f6,#60a5fa);border-radius:5px 5px 0 0;box-shadow:0 0 12px #3b82f666"></div>
            <div style="font-size:9px;color:#64748b">${label}</div>
          </div>`;
        }).join('')}
      </div>`;

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="card">
        <div class="stat-label">Schulden gesamt</div>
        <div style="font-size:24px;font-weight:800;color:#ef4444">${state.debts.length}</div>
        <div style="font-size:11px;color:#64748b">${doneCount} abbezahlt</div>
      </div>
      <div class="card">
        <div class="stat-label">Zahlungen</div>
        <div style="font-size:24px;font-weight:800;color:#10b981">${state.payments.length}</div>
        <div style="font-size:11px;color:#64748b">Einträge gesamt</div>
      </div>
    </div>
    <div class="card mb-16">
      <h3 style="font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:14px">Pro Schuld</h3>
      ${perDebtHTML}
    </div>
    <div class="card">
      <h3 style="font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:14px">Monatliche Zahlungen</h3>
      ${chartHTML}
    </div>`;
}

// ── Detail navigation ─────────────────────────────────────────────────────────
function openDetail(id) {
  detailDebtId = id;
  currentTab = 'debts';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='debts'));
  render();
}
function closeDetail() {
  detailDebtId = null;
  render();
}

// ── Debt Modal ────────────────────────────────────────────────────────────────
function openDebtModal(editId) {
  const modal = document.getElementById('debt-modal');
  const btn   = modal.querySelector('.btn-blue');
  // Build color picker
  const picker = document.getElementById('color-picker');
  picker.innerHTML = COLORS.map(c=>`<div class="color-swatch" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');

  if (editId) {
    const d = state.debts.find(x=>x.id===editId);
    document.getElementById('debt-modal-title').textContent = 'Schuld bearbeiten';
    document.getElementById('debt-edit-id').value = editId;
    document.getElementById('debt-name').value = d.name;
    document.getElementById('debt-creditor').value = d.creditor||'';
    document.getElementById('debt-amount').value = d.amount;
    document.getElementById('debt-due').value = d.dueDate||'';
    document.getElementById('debt-note').value = d.note||'';
    document.getElementById('debt-color').value = d.color;
    btn.textContent = 'Speichern';
    selectColor(d.color);
  } else {
    document.getElementById('debt-modal-title').textContent = 'Neue Schuld';
    document.getElementById('debt-edit-id').value = '';
    document.getElementById('debt-name').value = '';
    document.getElementById('debt-creditor').value = '';
    document.getElementById('debt-amount').value = '';
    document.getElementById('debt-due').value = '';
    document.getElementById('debt-note').value = '';
    document.getElementById('debt-color').value = COLORS[0];
    btn.textContent = 'Hinzufügen';
    selectColor(COLORS[0]);
  }
  modal.classList.remove('hidden');
}
function closeDebtModal() { document.getElementById('debt-modal').classList.add('hidden'); }
function selectColor(c) {
  document.getElementById('debt-color').value = c;
  document.querySelectorAll('.color-swatch').forEach(s=>{
    s.classList.toggle('selected', s.style.background===c || s.style.backgroundColor===c);
  });
}
function submitDebt() {
  const name   = document.getElementById('debt-name').value.trim();
  const amount = parseFloat(document.getElementById('debt-amount').value);
  if (!name || isNaN(amount)) { alert('Bitte Name und Betrag ausfüllen.'); return; }
  const editId = document.getElementById('debt-edit-id').value;
  const obj = {
    name, amount,
    creditor: document.getElementById('debt-creditor').value.trim(),
    dueDate:  document.getElementById('debt-due').value,
    note:     document.getElementById('debt-note').value.trim(),
    color:    document.getElementById('debt-color').value,
  };
  if (editId) {
    state.debts = state.debts.map(d=>d.id===editId?{...d,...obj}:d);
  } else {
    state.debts.push({ id:uid(), createdAt:todayISO(), ...obj });
  }
  saveData(); closeDebtModal(); render();
}

// ── Pay Modal ─────────────────────────────────────────────────────────────────
function openPayModal(preselId) {
  if (state.debts.length===0) { alert('Bitte zuerst eine Schuld anlegen.'); return; }
  const sel = document.getElementById('pay-debt-id');
  sel.innerHTML = state.debts.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
  if (preselId) sel.value = preselId;
  document.getElementById('pay-amount').value = '';
  document.getElementById('pay-date').value = todayISO();
  document.getElementById('pay-note').value = '';
  document.getElementById('pay-modal').classList.remove('hidden');
}
function closePayModal() { document.getElementById('pay-modal').classList.add('hidden'); }
function submitPay() {
  const debtId = document.getElementById('pay-debt-id').value;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  if (!debtId || isNaN(amount) || amount<=0) { alert('Bitte Schuld und Betrag angeben.'); return; }
  state.payments.push({
    id: uid(), debtId, amount,
    date: document.getElementById('pay-date').value || todayISO(),
    note: document.getElementById('pay-note').value.trim(),
  });
  saveData(); closePayModal(); render();
}

// ── Delete ────────────────────────────────────────────────────────────────────
function deleteDebt(id) {
  if (!confirm('Schuld und alle Zahlungen löschen?')) return;
  state.debts    = state.debts.filter(d=>d.id!==id);
  state.payments = state.payments.filter(p=>p.debtId!==id);
  if (detailDebtId===id) detailDebtId=null;
  saveData(); render();
}
function deletePayment(id) {
  if (!confirm('Zahlung löschen?')) return;
  state.payments = state.payments.filter(p=>p.id!==id);
  saveData(); render();
}

// ── Modal overlay click ───────────────────────────────────────────────────────
function modalOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) {
    document.getElementById(id).classList.add('hidden');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
render();
</script>
</body>
</html>
