<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FTTM — Trade Checker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:#040608;--bg2:#080d14;--bg3:#0e1520;
    --gold:#f0b429;--green:#00e676;--red:#ff3d5a;
    --blue:#38bdf8;--muted:#2a3a4a;--text:#dde8f0;
    --border:#0f1e2e;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,180,41,0.05) 0%,transparent 70%);}

  .app{max-width:480px;margin:0 auto;padding:24px 16px 80px;}

  .header{text-align:center;margin-bottom:32px;padding-top:8px;}
  .logo-wrap{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px;}
  .logo{width:40px;height:40px;background:var(--gold);border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#000;}
  .app-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--gold);}
  .app-sub{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;}

  .upload-area{
    border:2px dashed rgba(240,180,41,0.25);border-radius:20px;
    padding:32px 20px;text-align:center;cursor:pointer;
    transition:all 0.3s;background:var(--bg2);position:relative;overflow:hidden;
    margin-bottom:16px;
  }
  .upload-area::before{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at center,rgba(240,180,41,0.04) 0%,transparent 70%);
    opacity:0;transition:opacity 0.3s;}
  .upload-area:hover::before,.upload-area.drag::before{opacity:1;}
  .upload-area:hover,.upload-area.drag{border-color:rgba(240,180,41,0.6);}
  .upload-area.has-image{border-color:rgba(0,230,118,0.4);padding:0;border-radius:16px;}
  .upload-icon{font-size:36px;margin-bottom:10px;}
  .upload-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:4px;}
  .upload-sub{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
  #fileInput{display:none;}

  .preview-img{width:100%;border-radius:14px;display:block;max-height:500px;object-fit:contain;background:#000;}

  .analyze-btn{
    width:100%;padding:16px;border:none;border-radius:14px;
    background:var(--gold);color:#000;
    font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
    cursor:pointer;transition:all 0.2s;margin-bottom:24px;
    box-shadow:0 4px 24px rgba(240,180,41,0.25);
  }
  .analyze-btn:hover{background:#e0a420;transform:translateY(-2px);box-shadow:0 8px 32px rgba(240,180,41,0.35);}
  .analyze-btn:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}

  .loading{text-align:center;padding:32px;display:none;}
  .spinner{width:40px;height:40px;border:3px solid var(--border);
    border-top-color:var(--gold);border-radius:50%;
    animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--muted);font-family:'Space Mono',monospace;}

  .result{display:none;animation:fadeUp 0.4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  .verdict{
    border-radius:18px;padding:20px;text-align:center;
    margin-bottom:20px;position:relative;overflow:hidden;
  }
  .verdict.take{background:linear-gradient(135deg,rgba(0,230,118,0.15),rgba(0,230,118,0.05));
    border:1.5px solid rgba(0,230,118,0.4);}
  .verdict.wait{background:linear-gradient(135deg,rgba(255,61,90,0.15),rgba(255,61,90,0.05));
    border:1.5px solid rgba(255,61,90,0.3);}
  .verdict.maybe{background:linear-gradient(135deg,rgba(240,180,41,0.15),rgba(240,180,41,0.05));
    border:1.5px solid rgba(240,180,41,0.3);}

  .verdict-icon{font-size:40px;margin-bottom:8px;}
  .verdict-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;margin-bottom:4px;}
  .verdict.take .verdict-title{color:var(--green);}
  .verdict.wait .verdict-title{color:var(--red);}
  .verdict.maybe .verdict-title{color:var(--gold);}
  .verdict-sub{font-size:12px;font-family:'Space Mono',monospace;opacity:0.7;}

  .direction-badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 14px;border-radius:20px;
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
    margin-bottom:16px;
  }
  .direction-badge.long{background:rgba(0,230,118,0.12);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
  .direction-badge.short{background:rgba(255,61,90,0.1);color:var(--red);border:1px solid rgba(255,61,90,0.25);}
  .direction-badge.neutral{background:rgba(240,180,41,0.1);color:var(--gold);border:1px solid rgba(240,180,41,0.25);}

  .checklist-title{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}

  .check-item{
    display:flex;align-items:flex-start;gap:12px;
    background:var(--bg2);border:1px solid var(--border);
    border-radius:12px;padding:12px 14px;
    transition:border-color 0.2s;
  }
  .check-item.pass{border-color:rgba(0,230,118,0.25);}
  .check-item.fail{border-color:rgba(255,61,90,0.2);}
  .check-item.warn{border-color:rgba(240,180,41,0.25);}

  .check-icon{
    width:28px;height:28px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;flex-shrink:0;margin-top:1px;
  }
  .check-item.pass .check-icon{background:rgba(0,230,118,0.12);}
  .check-item.fail .check-icon{background:rgba(255,61,90,0.1);}
  .check-item.warn .check-icon{background:rgba(240,180,41,0.1);}

  .check-content{flex:1;}
  .check-name{font-size:13px;font-weight:600;margin-bottom:2px;}
  .check-item.pass .check-name{color:var(--green);}
  .check-item.fail .check-name{color:var(--red);}
  .check-item.warn .check-name{color:var(--gold);}
  .check-detail{font-size:11px;color:#5a7a8a;font-family:'Space Mono',monospace;line-height:1.5;}

  .comment-box{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:14px;padding:16px;
  }
  .comment-label{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .comment-text{font-size:13px;color:#8aa0b0;line-height:1.7;}

  .reset-btn{
    width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;
    background:transparent;color:var(--muted);
    font-family:'Space Mono',monospace;font-size:11px;
    cursor:pointer;transition:all 0.2s;margin-top:14px;
  }
  .reset-btn:hover{border-color:var(--gold);color:var(--gold);}

  .apikey-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;}
  .apikey-wrap.saved{border-color:rgba(0,230,118,0.3);}
  .apikey-label{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .apikey-row{display:flex;gap:8px;margin-bottom:6px;}
  .apikey-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:'Space Mono',monospace;font-size:11px;
    padding:8px 12px;outline:none;transition:border-color 0.2s;}
  .apikey-input:focus{border-color:var(--gold);}
  .save-key-btn{background:var(--gold);color:#000;border:none;border-radius:8px;
    width:36px;font-size:16px;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
  .save-key-btn:hover{background:#e0a420;}
  .apikey-sub{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}

  .error-box{background:rgba(255,61,90,0.08);border:1px solid rgba(255,61,90,0.2);
    border-radius:12px;padding:14px;text-align:center;
    font-size:12px;color:var(--red);font-family:'Space Mono',monospace;line-height:1.6;display:none;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-wrap">
      <div class="logo">FT²</div>
      <div class="app-name">Trade Checker</div>
    </div>
    <div class="app-sub">Auto S/R Bounce · XAUUSD H1</div>
  </div>

  <div class="apikey-wrap" id="apikeyWrap">
    <div class="apikey-label">// Anthropic API Key</div>
    <div class="apikey-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." class="apikey-input">
      <button onclick="saveKey()" class="save-key-btn">✓</button>
    </div>
    <div class="apikey-sub" id="apikeySub">Einmalig eingeben — wird lokal gespeichert</div>
  </div>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div id="uploadContent">
      <div class="upload-icon">📊</div>
      <div class="upload-title">Chart Screenshot laden</div>
      <div class="upload-sub">H1 Chart · XAUUSD · MT5</div>
    </div>
    <img class="preview-img" id="previewImg" style="display:none">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()" disabled>
    🔍 SETUP ANALYSIEREN
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Claude analysiert deinen Chart...</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result"></div>

</div>

<script>
let imageBase64 = null;
let imageMediaType = 'image/jpeg';

window.addEventListener('load', () => {
  const saved = localStorage.getItem('fttm_api_key');
  if(saved){
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('apikeyWrap').classList.add('saved');
    document.getElementById('apikeySub').textContent = '✓ Key gespeichert';
  }
});

function saveKey(){
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key.startsWith('sk-ant-')){alert('Ungültiger API Key — muss mit sk-ant- beginnen!');return;}
  localStorage.setItem('fttm_api_key', key);
  document.getElementById('apikeyWrap').classList.add('saved');
  document.getElementById('apikeySub').textContent = '✓ Key gespeichert';
  alert('✓ API Key gespeichert!');
}

document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    imageMediaType = ev.target.result.split(';')[0].split(':')[1] || 'image/jpeg';
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('uploadContent').style.display = 'none';
    document.getElementById('uploadArea').classList.add('has-image');
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

const area = document.getElementById('uploadArea');
area.addEventListener('dragover', e=>{e.preventDefault();area.classList.add('drag');});
area.addEventListener('dragleave', ()=>area.classList.remove('drag'));
area.addEventListener('drop', e=>{
  e.preventDefault();area.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file){
    const dt = new DataTransfer();dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    document.getElementById('fileInput').dispatchEvent(new Event('change'));
  }
});

async function analyze(){
  if(!imageBase64){alert('Bitte zuerst ein Bild laden!');return;}
  const apiKey = localStorage.getItem('fttm_api_key') || document.getElementById('apiKeyInput').value.trim();
  if(!apiKey){alert('Bitte zuerst den API Key eingeben und speichern!');return;}
  if(!apiKey.startsWith('sk-ant-')){alert('Ungültiger API Key!');return;}

  document.getElementById('loading').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  const prompt = `Du bist ein erfahrener Chart-Analyst. Deine Aufgabe: Analysiere diesen XAUUSD H1 Chart aus MT5 nach der "Auto S/R Bounce" Strategie.

CHART-LEGENDE:
- Lila/violette Linie = EMA50
- Zwei weiße Linien oben und unten = Bollinger Bands (oberes Band, unteres Band)
- Zeitachse: LINKS = älteste Kerzen, RECHTS = neueste Kerzen
- Die Kerze ganz rechts am Rand = die AKTUELLE Kerze (jetzt)
- RSI(14) Wert steht als Zahl direkt neben dem Text "RSI(14)" im unteren Chartbereich
- ATR(14) Wert steht als Zahl direkt neben dem Text "ATR(14)" ganz unten

DEINE ANALYSE — führe jeden Check sorgfältig durch:

CHECK 1 — EMA50 Trendfilter:
Schau wo der Body der aktuellen Kerze (ganz rechts) im Verhältnis zur lila EMA50-Linie liegt.
→ pass: Kerzen-Body liegt OBERHALB der lila Linie (Long-Trend bestätigt)
→ fail: Kerzen-Body liegt UNTERHALB der lila Linie (kein Long erlaubt)

CHECK 2 — Frisches Pivot Low:
Ein Pivot Low = eine Kerze deren LOW tiefer liegt als das Low der Kerze links davon UND das Low der Kerze rechts davon.
Prüfe die letzten 7-15 Kerzen von rechts. Dann prüfe: Ist die aktuelle Kerze (ganz rechts) noch DIREKT am oder maximal 2 Kerzen über diesem Pivot Low?
→ pass: Frisches Pivot Low gefunden UND aktuelle Kerze noch nah am Level
→ warn: Pivot Low vorhanden aber Preis schon deutlich darüber weggelaufen
→ fail: Kein Pivot Low erkennbar, oder Preis ist weit über das Level hinaus

CHECK 3 — RSI(14) Momentum:
Lies den exakten Zahlenwert neben "RSI(14)" ab. Vergleiche ihn mit der 48/52 Schwelle.
→ pass: Wert ist kleiner als 48 (überverkauft, Bounce-Potential)
→ warn: Wert liegt zwischen 48 und 52 (neutral)
→ fail: Wert ist größer als 52 (überkauft, kein guter Long-Einstieg)

CHECK 4 — Bollinger Band Position:
Schau wo die aktuelle Kerze (ganz rechts) zwischen den zwei weißen Bändern steht.
Das untere weiße Band ist das Kaufsignal für einen Bounce.
→ pass: Aktueller Kerzenkörper berührt oder unterschreitet das UNTERE weiße Band
→ warn: Kerze befindet sich im mittleren Drittel zwischen den Bändern
→ fail: Kerze befindet sich nahe dem OBEREN weißen Band

CHECK 5 — Bestätigungskerze:
Analysiere die FORM der aktuellen Kerze (ganz rechts). IGNORIERE die Farbe komplett — beurteile nur nach Struktur:
Bullisch = Close höher als Open = oberes Ende des Kerzenbodys ist der Schlusskurs
Bearisch = Close tiefer als Open = unteres Ende des Kerzenbodys ist der Schlusskurs
→ pass: Bullisches Engulfing (Body größer als vorherige Kerze, Close über deren Open) ODER Hammer (untere Lunte mindestens doppelt so lang wie der Body)
→ warn: Kleine Kerze mit bullischem Schluss (Close > Open) aber kein klares Muster
→ fail: Bearische Kerze (Close < Open) ODER Kerze ist weit über dem Pivot Low (Setup abgelaufen)

CHECK 6 — ATR Volatilität:
Lies den exakten Zahlenwert neben "ATR(14)" ab.
→ pass: Wert größer als 15 (genug Bewegung für einen profitablen Trade)
→ warn: Wert zwischen 8 und 15 (moderate Volatilität, Vorsicht)
→ fail: Wert kleiner als 8 (zu wenig Bewegung, Stop-Hunt-Gefahr)

GESAMTURTEIL:
Zähle alle "pass" Ergebnisse.
6 oder 5 PASS → verdict: "take"
4 oder 3 PASS → verdict: "maybe"
2 oder weniger PASS → verdict: "wait"

Handelsrichtung:
CHECK 1 pass → direction: "long"
CHECK 1 fail → direction: "short"

Antworte AUSSCHLIESSLICH mit diesem JSON. Kein Text davor, kein Text danach, keine Backticks:
{"direction":"long","verdict":"maybe","checks":[{"name":"EMA50 Filter","status":"pass","detail":"Kerzenbody liegt oberhalb der lila EMA50 Linie"},{"name":"Pivot Low","status":"fail","detail":"Kein frisches Pivot Low — Preis bereits X Punkte über letztem Tief"},{"name":"RSI Signal","status":"fail","detail":"RSI(14) = 52.50 — über 52, für Long zu hoch"},{"name":"Bollinger Bands","status":"warn","detail":"Kerze befindet sich im mittleren Bereich der Bänder"},{"name":"Bestätigungskerze","status":"warn","detail":"Kleine Kerze mit bullischem Close, kein klares Engulfing oder Hammer"},{"name":"ATR Volatilität","status":"pass","detail":"ATR(14) = 21.14 — ausreichend Volatilität"}],"comment":"Konkrete 2-3 Sätze auf Deutsch: was spricht für/gegen den Trade und was sollte der Trader jetzt tun."}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {type:'image', source:{type:'base64', media_type:imageMediaType, data:imageBase64}},
            {type:'text', text:prompt}
          ]
        }]
      })
    });

    const data = await response.json();
    if(data.error) throw new Error(data.error.message);

    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    renderResult(parsed);

  } catch(err) {
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = 'Fehler: ' + err.message;
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function renderResult(data){
  const icons = {pass:'✅', fail:'❌', warn:'⚠️'};
  const verdictData = {
    take:{icon:'🟢', title:'TRADE NEHMEN', sub:'Setup ist bereit — alle wichtigen Bedingungen erfüllt'},
    wait:{icon:'🔴', title:'WARTEN', sub:'Setup noch nicht bereit — wichtige Bedingungen fehlen'},
    maybe:{icon:'🟡', title:'ABWÄGEN', sub:'Setup teilweise erfüllt — eigenes Urteil gefragt'}
  };
  const dirData = {
    long:{cls:'long', label:'↑ LONG Setup erkannt'},
    short:{cls:'short', label:'↓ SHORT Setup erkannt'},
    neutral:{cls:'neutral', label:'↔ Richtung unklar'}
  };

  const v = verdictData[data.verdict] || verdictData.wait;
  const d = dirData[data.direction] || dirData.neutral;

  const checksHtml = data.checks.map(c=>`
    <div class="check-item ${c.status}">
      <div class="check-icon">${icons[c.status]||'⚠️'}</div>
      <div class="check-content">
        <div class="check-name">${c.name}</div>
        <div class="check-detail">${c.detail}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('result').innerHTML = `
    <div class="verdict ${data.verdict}">
      <div class="verdict-icon">${v.icon}</div>
      <div class="verdict-title">${v.title}</div>
      <div class="verdict-sub">${v.sub}</div>
    </div>
    <div style="text-align:center;margin-bottom:16px;">
      <span class="direction-badge ${d.cls}">${d.label}</span>
    </div>
    <div class="checklist-title">// Checkliste</div>
    <div class="checklist">${checksHtml}</div>
    <div class="comment-box">
      <div class="comment-label">// Claude's Analyse</div>
      <div class="comment-text">${data.comment}</div>
    </div>
    <button class="reset-btn" onclick="resetApp()">↺ Neuen Chart analysieren</button>
  `;
  document.getElementById('result').style.display = 'block';
}

function resetApp(){
  imageBase64 = null;
  imageMediaType = 'image/jpeg';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('uploadContent').style.display = 'block';
  document.getElementById('uploadArea').classList.remove('has-image');
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('fileInput').value = '';
}
</script>
</body>
</html>
