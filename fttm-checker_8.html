<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FTTM — Trade Checker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:#040608;--bg2:#080d14;--bg3:#0e1520;
    --gold:#f0b429;--green:#00e676;--red:#ff3d5a;
    --blue:#38bdf8;--muted:#2a3a4a;--text:#dde8f0;
    --border:#0f1e2e;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,180,41,0.05) 0%,transparent 70%);}

  .app{max-width:480px;margin:0 auto;padding:24px 16px 80px;}

  .header{text-align:center;margin-bottom:32px;padding-top:8px;}
  .logo-wrap{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px;}
  .logo{width:40px;height:40px;background:var(--gold);border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#000;}
  .app-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--gold);}
  .app-sub{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;}

  .upload-area{
    border:2px dashed rgba(240,180,41,0.25);border-radius:20px;
    padding:32px 20px;text-align:center;cursor:pointer;
    transition:all 0.3s;background:var(--bg2);position:relative;overflow:hidden;
    margin-bottom:16px;
  }
  .upload-area::before{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at center,rgba(240,180,41,0.04) 0%,transparent 70%);
    opacity:0;transition:opacity 0.3s;}
  .upload-area:hover::before,.upload-area.drag::before{opacity:1;}
  .upload-area:hover,.upload-area.drag{border-color:rgba(240,180,41,0.6);}
  .upload-area.has-image{border-color:rgba(0,230,118,0.4);padding:0;border-radius:16px;}
  .upload-icon{font-size:36px;margin-bottom:10px;}
  .upload-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:4px;}
  .upload-sub{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
  #fileInput{display:none;}

  .preview-img{width:100%;border-radius:14px;display:block;max-height:500px;object-fit:contain;background:#000;}

  .analyze-btn{
    width:100%;padding:16px;border:none;border-radius:14px;
    background:var(--gold);color:#000;
    font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
    cursor:pointer;transition:all 0.2s;margin-bottom:24px;
    box-shadow:0 4px 24px rgba(240,180,41,0.25);
  }
  .analyze-btn:hover{background:#e0a420;transform:translateY(-2px);box-shadow:0 8px 32px rgba(240,180,41,0.35);}
  .analyze-btn:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}

  .loading{text-align:center;padding:32px;display:none;}
  .spinner{width:40px;height:40px;border:3px solid var(--border);
    border-top-color:var(--gold);border-radius:50%;
    animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--muted);font-family:'Space Mono',monospace;}

  .result{display:none;animation:fadeUp 0.4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  .verdict{
    border-radius:18px;padding:20px;text-align:center;
    margin-bottom:20px;position:relative;overflow:hidden;
  }
  .verdict.take{background:linear-gradient(135deg,rgba(0,230,118,0.15),rgba(0,230,118,0.05));
    border:1.5px solid rgba(0,230,118,0.4);}
  .verdict.wait{background:linear-gradient(135deg,rgba(255,61,90,0.15),rgba(255,61,90,0.05));
    border:1.5px solid rgba(255,61,90,0.3);}
  .verdict.maybe{background:linear-gradient(135deg,rgba(240,180,41,0.15),rgba(240,180,41,0.05));
    border:1.5px solid rgba(240,180,41,0.3);}

  .verdict-icon{font-size:40px;margin-bottom:8px;}
  .verdict-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;margin-bottom:4px;}
  .verdict.take .verdict-title{color:var(--green);}
  .verdict.wait .verdict-title{color:var(--red);}
  .verdict.maybe .verdict-title{color:var(--gold);}
  .verdict-sub{font-size:12px;font-family:'Space Mono',monospace;opacity:0.7;}

  .direction-badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 14px;border-radius:20px;
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
    margin-bottom:16px;
  }
  .direction-badge.long{background:rgba(0,230,118,0.12);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
  .direction-badge.short{background:rgba(255,61,90,0.1);color:var(--red);border:1px solid rgba(255,61,90,0.25);}
  .direction-badge.neutral{background:rgba(240,180,41,0.1);color:var(--gold);border:1px solid rgba(240,180,41,0.25);}

  .checklist-title{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}

  .check-item{
    display:flex;align-items:flex-start;gap:12px;
    background:var(--bg2);border:1px solid var(--border);
    border-radius:12px;padding:12px 14px;
    transition:border-color 0.2s;
  }
  .check-item.pass{border-color:rgba(0,230,118,0.25);}
  .check-item.fail{border-color:rgba(255,61,90,0.2);}
  .check-item.warn{border-color:rgba(240,180,41,0.25);}

  .check-icon{
    width:28px;height:28px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;flex-shrink:0;margin-top:1px;
  }
  .check-item.pass .check-icon{background:rgba(0,230,118,0.12);}
  .check-item.fail .check-icon{background:rgba(255,61,90,0.1);}
  .check-item.warn .check-icon{background:rgba(240,180,41,0.1);}

  .check-content{flex:1;}
  .check-name{font-size:13px;font-weight:600;margin-bottom:2px;}
  .check-item.pass .check-name{color:var(--green);}
  .check-item.fail .check-name{color:var(--red);}
  .check-item.warn .check-name{color:var(--gold);}
  .check-detail{font-size:11px;color:#5a7a8a;font-family:'Space Mono',monospace;line-height:1.5;}

  .comment-box{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:14px;padding:16px;
  }
  .comment-label{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .comment-text{font-size:13px;color:#8aa0b0;line-height:1.7;}

  .reset-btn{
    width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;
    background:transparent;color:var(--muted);
    font-family:'Space Mono',monospace;font-size:11px;
    cursor:pointer;transition:all 0.2s;margin-top:14px;
  }
  .reset-btn:hover{border-color:var(--gold);color:var(--gold);}

  .apikey-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;}
  .apikey-wrap.saved{border-color:rgba(0,230,118,0.3);}
  .apikey-label{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .apikey-row{display:flex;gap:8px;margin-bottom:6px;}
  .apikey-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:'Space Mono',monospace;font-size:11px;
    padding:8px 12px;outline:none;transition:border-color 0.2s;}
  .apikey-input:focus{border-color:var(--gold);}
  .save-key-btn{background:var(--gold);color:#000;border:none;border-radius:8px;
    width:36px;font-size:16px;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
  .save-key-btn:hover{background:#e0a420;}
  .apikey-sub{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}

  .error-box{background:rgba(255,61,90,0.08);border:1px solid rgba(255,61,90,0.2);
    border-radius:12px;padding:14px;text-align:center;
    font-size:12px;color:var(--red);font-family:'Space Mono',monospace;line-height:1.6;display:none;}

  /* Feedback */
  .feedback-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;}
  .feedback-label{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .feedback-q{font-size:12px;color:var(--text);margin-bottom:8px;font-weight:500;}
  .feedback-btns{display:flex;gap:8px;margin-bottom:14px;}
  .fb-btn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:20px;cursor:pointer;transition:all 0.2s;text-align:center;}
  .fb-btn:hover{transform:scale(1.08);}
  .fb-btn.sel-correct{background:rgba(0,230,118,0.15);border-color:rgba(0,230,118,0.5);}
  .fb-btn.sel-partial{background:rgba(240,180,41,0.15);border-color:rgba(240,180,41,0.5);}
  .fb-btn.sel-wrong{background:rgba(255,61,90,0.15);border-color:rgba(255,61,90,0.4);}
  .feedback-note{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:10px 12px;outline:none;resize:none;transition:border-color 0.2s;display:none;margin-bottom:10px;}
  .feedback-note:focus{border-color:var(--gold);}
  .save-fb-btn{width:100%;padding:10px;border:none;border-radius:10px;background:var(--gold);color:#000;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;display:none;}
  .save-fb-btn:hover{background:#e0a420;}
  .fb-saved{font-size:11px;color:var(--green);font-family:'Space Mono',monospace;text-align:center;margin-top:8px;display:none;}
  .fh-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:none;}
  .fh-label{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .fh-clear{font-size:10px;color:var(--muted);cursor:pointer;}
  .fh-clear:hover{color:var(--red);}
  .fh-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;font-family:'Space Mono',monospace;color:#5a7a8a;line-height:1.4;}
  .fh-item:last-child{border-bottom:none;}

  .error-option{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    padding:9px 12px;font-size:11px;font-family:'Space Mono',monospace;color:#5a7a8a;
    cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
  .error-option:hover{border-color:var(--gold);color:var(--text);}
  .error-option.eo-selected{background:rgba(255,61,90,0.1);border-color:rgba(255,61,90,0.4);color:var(--red);}
  .eo-check{font-size:14px;flex-shrink:0;}
  .fh-icon{flex-shrink:0;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-wrap">
      <div class="logo">FT²</div>
      <div class="app-name">Trade Checker</div>
    </div>
    <div class="app-sub">Auto S/R Bounce · XAUUSD H1 · EMA50 manuell</div>
  </div>

  <div class="apikey-wrap" id="apikeyWrap">
    <div class="apikey-label">// Anthropic API Key</div>
    <div class="apikey-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." class="apikey-input">
      <button onclick="saveKey()" class="save-key-btn">✓</button>
    </div>
    <div class="apikey-sub" id="apikeySub">Einmalig eingeben — wird lokal gespeichert</div>
  </div>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div id="uploadContent">
      <div class="upload-icon">📊</div>
      <div class="upload-title">Chart Screenshot laden</div>
      <div class="upload-sub">H1 Chart · XAUUSD · MT5</div>
    </div>
    <img class="preview-img" id="previewImg" style="display:none">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()" disabled>
    🔍 SETUP ANALYSIEREN
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Claude analysiert deinen Chart...</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result"></div>

</div>

<script>
let imageBase64 = null;
let imageMediaType = 'image/jpeg';


// ── Feedback System ──────────────────────────────────────
let currentFeedbackVerdict = null;
let selectedFeedback = null;

const ERROR_OPTIONS = [
  {id:'pivot_not_fresh',   label:'Pivot Low war nicht frisch (Preis schon weggelaufen)'},
  {id:'pivot_not_found',   label:'Kein Pivot Low erkannt obwohl eines vorhanden war'},
  {id:'candle_wrong',      label:'Bestätigungskerze falsch bewertet (bullisch/bearisch)'},
  {id:'rsi_misread',       label:'RSI Wert falsch abgelesen'},
  {id:'bb_wrong',          label:'Bollinger Band Position falsch bewertet'},
  {id:'ema_wrong',         label:'EMA50 Position falsch bewertet'},
  {id:'atr_misread',       label:'ATR Wert falsch abgelesen'},
  {id:'verdict_wrong',     label:'Gesamturteil falsch (take/wait/maybe)'},
];
let selectedErrors = new Set();

function selectFeedback(type) {
  selectedFeedback = type;
  ['correct','partial','wrong'].forEach(t => {
    document.getElementById('fb-' + t).className = 'fb-btn';
  });
  document.getElementById('fb-' + type).classList.add('sel-' + type);
  document.getElementById('fbSaved').style.display = 'none';

  if (type === 'correct') {
    document.getElementById('errorPickerWrap').style.display = 'none';
    document.getElementById('saveFbBtn').style.display = 'block';
  } else {
    selectedErrors = new Set();
    const picker = document.getElementById('errorPicker');
    picker.innerHTML = ERROR_OPTIONS.map(o => `
      <div class="error-option" id="eo-${o.id}" onclick="toggleError('${o.id}')">
        <span class="eo-check">○</span> ${o.label}
      </div>
    `).join('');
    document.getElementById('errorPickerWrap').style.display = 'block';
    document.getElementById('saveFbBtn').style.display = 'block';
  }
}

function toggleError(id) {
  if (selectedErrors.has(id)) {
    selectedErrors.delete(id);
    document.getElementById('eo-' + id).classList.remove('eo-selected');
    document.querySelector('#eo-' + id + ' .eo-check').textContent = '○';
  } else {
    selectedErrors.add(id);
    document.getElementById('eo-' + id).classList.add('eo-selected');
    document.querySelector('#eo-' + id + ' .eo-check').textContent = '●';
  }
}

function saveFeedback() {
  if (!selectedFeedback || !currentFeedbackVerdict) return;
  const note = document.getElementById('feedbackNote') ? document.getElementById('feedbackNote').value.trim() : '';
  const errors = Array.from(selectedErrors).map(id => ERROR_OPTIONS.find(o=>o.id===id)?.label).filter(Boolean);
  const entry = {
    ts: new Date().toLocaleString('de-DE', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
    verdict: currentFeedbackVerdict,
    rating: selectedFeedback,
    errors: errors,
    note: note
  };
  const history = getFeedbackHistory();
  history.unshift(entry);
  if (history.length > 15) history.pop();
  localStorage.setItem('fttm_feedback', JSON.stringify(history));
  document.getElementById('saveFbBtn').style.display = 'none';
  document.getElementById('fbSaved').style.display = 'block';
  renderFeedbackHistory();
}

function getFeedbackHistory() {
  try { return JSON.parse(localStorage.getItem('fttm_feedback') || '[]'); } catch { return []; }
}

function clearFeedback() {
  if (confirm('Lernprotokoll löschen?')) {
    localStorage.removeItem('fttm_feedback');
    renderFeedbackHistory();
  }
}

function renderFeedbackHistory() {
  const history = getFeedbackHistory();
  const wrap = document.getElementById('fhWrap');
  const list = document.getElementById('fhList');
  if (history.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const icons = {correct:'✅', partial:'⚠️', wrong:'❌'};
  list.innerHTML = history.map(h => {
    const errs = h.errors?.join(', ') || h.note || '—';
    return `<div class="fh-item"><span class="fh-icon">${icons[h.rating]}</span><span>${h.ts} · ${h.verdict.toUpperCase()} · ${errs}</span></div>`;
  }).join('');
}

function buildFeedbackContext() {
  const history = getFeedbackHistory();
  if (history.length === 0) return '';
  const bad = history.filter(h => h.rating !== 'correct' && (h.errors?.length > 0 || h.note));
  if (bad.length === 0) return '';
  let ctx = '\n\nWICHTIG — Lernkontext aus vorherigen Fehlern. Vermeide diese Fehler diesmal:\n';
  bad.slice(0,6).forEach(h => {
    const errs = h.errors?.join(', ') || '';
    const note = h.note || '';
    ctx += `- ${errs}${note ? ' (' + note + ')' : ''}\n`;
  });
  return ctx;
}

// Load history on start
window.addEventListener('load', () => {
  renderFeedbackHistory();
  const saved = localStorage.getItem('fttm_api_key');
  if(saved){
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('apikeyWrap').classList.add('saved');
    document.getElementById('apikeySub').textContent = '✓ Key gespeichert';
  }
});


function saveKey(){
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key.startsWith('sk-ant-')){alert('Ungültiger API Key — muss mit sk-ant- beginnen!');return;}
  localStorage.setItem('fttm_api_key', key);
  document.getElementById('apikeyWrap').classList.add('saved');
  document.getElementById('apikeySub').textContent = '✓ Key gespeichert';
  alert('✓ API Key gespeichert!');
}

document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    imageMediaType = ev.target.result.split(';')[0].split(':')[1] || 'image/jpeg';
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('uploadContent').style.display = 'none';
    document.getElementById('uploadArea').classList.add('has-image');
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

const area = document.getElementById('uploadArea');
area.addEventListener('dragover', e=>{e.preventDefault();area.classList.add('drag');});
area.addEventListener('dragleave', ()=>area.classList.remove('drag'));
area.addEventListener('drop', e=>{
  e.preventDefault();area.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file){
    const dt = new DataTransfer();dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    document.getElementById('fileInput').dispatchEvent(new Event('change'));
  }
});

async function analyze(){
  if(!imageBase64){alert('Bitte zuerst ein Bild laden!');return;}
  const apiKey = localStorage.getItem('fttm_api_key') || document.getElementById('apiKeyInput').value.trim();
  if(!apiKey){alert('Bitte zuerst den API Key eingeben und speichern!');return;}
  if(!apiKey.startsWith('sk-ant-')){alert('Ungültiger API Key!');return;}

  document.getElementById('loading').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  const feedbackCtx = buildFeedbackContext();
  const prompt = `Du bist ein erfahrener Chart-Analyst. Analysiere diesen XAUUSD H1 Chart aus MT5 nach der "Auto S/R Bounce" Strategie.

CHART-LEGENDE:
- Zwei WEISSE Linien oben und unten = Bollinger Bands
- Zeitachse: LINKS = älteste Kerzen, RECHTS = neueste Kerzen
- Die Kerze ganz rechts = aktuelle Kerze (jetzt)
- RSI(14) Wert steht als Zahl direkt neben "RSI(14)" im unteren Chartbereich
- ATR(14) Wert steht als Zahl direkt neben "ATR(14)" ganz unten
- Aktueller Preis: die Zahl in der farbigen Box ganz rechts auf der Y-Achse

DEINE ANALYSE — führe jeden Check sorgfältig durch:

CHECK 1 — Frisches Pivot Low/High:
Ein Pivot Low = Kerze deren LOW tiefer liegt als das Low der Kerze links UND rechts davon.
Ein Pivot High = Kerze deren HIGH höher liegt als das High der Kerze links UND rechts davon.
Schritt 1: Suche in den letzten 7-15 Kerzen nach einem Pivot Low ODER Pivot High.
Schritt 2: Zähle wie viele Kerzen seit diesem Pivot vergangen sind.
→ pass: Pivot gefunden UND maximal 2 Kerzen seitdem (Preis noch direkt am Level)
→ warn: Pivot gefunden aber 3-5 Kerzen seitdem
→ fail: Kein Pivot in 7-15 Kerzen ODER mehr als 5 Kerzen seit dem Pivot ODER Preis mehr als ATR-Wert vom Pivot entfernt

CHECK 2 — RSI(14) Momentum:
Lies den exakten Zahlenwert neben "RSI(14)" ab. Die Grenzen sind HART — keine Ausnahmen.
Für ein Pivot LOW (Long-Setup):
→ pass: RSI unter 48.00
→ warn: RSI zwischen 48.00 und 52.00
→ fail: RSI 52.01 oder höher — IMMER fail, auch 52.01 ist fail
Für ein Pivot HIGH (Short-Setup):
→ pass: RSI über 52.00
→ warn: RSI zwischen 48.00 und 52.00
→ fail: RSI 47.99 oder niedriger — IMMER fail

CHECK 3 — Bollinger Band Position:
Schau wo die aktuelle Kerze (ganz rechts) zwischen den weißen Bändern steht.
Für Pivot LOW (Long):
→ pass: Kerze berührt oder unterschreitet das UNTERE weiße Band
→ warn: Kerze im mittleren Bereich
→ fail: Kerze am oberen Band
Für Pivot HIGH (Short):
→ pass: Kerze berührt oder überschreitet das OBERE weiße Band
→ warn: Kerze im mittleren Bereich
→ fail: Kerze am unteren Band

CHECK 4 — Bestätigungskerze:
Beurteile NUR nach FORM, nicht nach Farbe. Close > Open = bullisch. Close < Open = bearisch.
Für Pivot LOW (Long):
→ pass: Bullisches Engulfing (Body größer als vorherige Kerze, Close > Open) ODER Hammer (untere Lunte mind. 2x Body)
→ warn: Kleine Kerze mit Close > Open
→ fail: Close < Open (bearisch) ODER Kerze weit über Pivot Level
Für Pivot HIGH (Short):
→ pass: Bearisches Engulfing (Body größer als vorherige Kerze, Close < Open) ODER Shooting Star (obere Lunte mind. 2x Body)
→ warn: Kleine Kerze mit Close < Open
→ fail: Close > Open (bullisch) ODER Kerze weit unter Pivot Level

CHECK 5 — ATR Volatilität:
Lies den exakten Zahlenwert neben "ATR(14)" ab.
→ pass: Wert größer als 15
→ warn: Wert zwischen 8 und 15
→ fail: Wert kleiner als 8

RICHTUNG bestimmen:
Wenn du ein Pivot LOW gefunden hast → direction: "long"
Wenn du ein Pivot HIGH gefunden hast → direction: "short"
Wenn beides unklar → direction: "neutral"

GESAMTURTEIL:
Zähle alle "pass" Ergebnisse.
5 PASS → verdict: "take"
3 oder 4 PASS → verdict: "maybe"
2 oder weniger PASS → verdict: "wait"

${feedbackCtx}

Antworte AUSSCHLIESSLICH mit diesem JSON. Kein Text davor, kein Text danach, keine Backticks:
{"direction":"long","verdict":"wait","checks":[{"name":"Pivot Low/High","status":"fail","detail":"Kein frisches Pivot — Preis bereits weit weggelaufen"},{"name":"RSI Signal","status":"fail","detail":"RSI(14) = 49.07 — im neutralen Bereich, für Long zu hoch"},{"name":"Bollinger Bands","status":"pass","detail":"Kerze berührt das untere Band"},{"name":"Bestätigungskerze","status":"warn","detail":"Kleine Kerze mit bullischem Close, kein klares Muster"},{"name":"ATR Volatilität","status":"pass","detail":"ATR(14) = 16.54 — ausreichend Volatilität"}],"comment":"Konkreter Kommentar auf Deutsch was der Trader jetzt tun sollte."}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {type:'image', source:{type:'base64', media_type:imageMediaType, data:imageBase64}},
            {type:'text', text:prompt}
          ]
        }]
      })
    });

    const data = await response.json();
    if(data.error) throw new Error(data.error.message);

    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    currentFeedbackVerdict = parsed.verdict;
    selectedFeedback = null;
    renderResult(parsed);

  } catch(err) {
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = 'Fehler: ' + err.message;
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function renderResult(data){
  const icons = {pass:'✅', fail:'❌', warn:'⚠️'};
  const verdictData = {
    take:{icon:'🟢', title:'TRADE NEHMEN', sub:'Setup ist bereit — alle wichtigen Bedingungen erfüllt'},
    wait:{icon:'🔴', title:'WARTEN', sub:'Setup noch nicht bereit — wichtige Bedingungen fehlen'},
    maybe:{icon:'🟡', title:'ABWÄGEN', sub:'Setup teilweise erfüllt — eigenes Urteil gefragt'}
  };
  const dirData = {
    long:{cls:'long', label:'↑ LONG Setup erkannt'},
    short:{cls:'short', label:'↓ SHORT Setup erkannt'},
    neutral:{cls:'neutral', label:'↔ Richtung unklar'}
  };

  const v = verdictData[data.verdict] || verdictData.wait;
  const d = dirData[data.direction] || dirData.neutral;

  const checksHtml = data.checks.map(c=>`
    <div class="check-item ${c.status}">
      <div class="check-icon">${icons[c.status]||'⚠️'}</div>
      <div class="check-content">
        <div class="check-name">${c.name}</div>
        <div class="check-detail">${c.detail}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('result').innerHTML = `
    <div class="verdict ${data.verdict}">
      <div class="verdict-icon">${v.icon}</div>
      <div class="verdict-title">${v.title}</div>
      <div class="verdict-sub">${v.sub}</div>
    </div>
    <div style="text-align:center;margin-bottom:16px;">
      <span class="direction-badge ${d.cls}">${d.label}</span>
    </div>
    <div class="checklist-title">// Checkliste</div>
    <div class="checklist">${checksHtml}</div>
    <div class="comment-box">
      <div class="comment-label">// Claude's Analyse</div>
      <div class="comment-text">${data.comment}</div>
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-label">// Dein Feedback</div>
      <div class="feedback-q">War die Analyse korrekt?</div>
      <div class="feedback-btns">
        <div class="fb-btn" id="fb-correct" onclick="selectFeedback('correct')" title="Korrekt">✅</div>
        <div class="fb-btn" id="fb-partial" onclick="selectFeedback('partial')" title="Teilweise">⚠️</div>
        <div class="fb-btn" id="fb-wrong" onclick="selectFeedback('wrong')" title="Falsch">❌</div>
      </div>
      <div id="errorPickerWrap" style="display:none">
        <div class="feedback-q" style="margin-bottom:8px;">Was war falsch?</div>
        <div id="errorPicker" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;"></div>
        <textarea class="feedback-note" id="feedbackNote" rows="2" placeholder="Zusatz (optional)" style="display:block"></textarea>
      </div>
      <button class="save-fb-btn" id="saveFbBtn" onclick="saveFeedback()">💾 FEEDBACK SPEICHERN</button>
      <div class="fb-saved" id="fbSaved">✓ Gespeichert — KI lernt beim nächsten Analyse-Call</div>
    </div>
    <button class="reset-btn" onclick="resetApp()">↺ Neuen Chart analysieren</button>
  `;
  document.getElementById('result').style.display = 'block';
}

function resetApp(){
  imageBase64 = null;
  imageMediaType = 'image/jpeg';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('uploadContent').style.display = 'block';
  document.getElementById('uploadArea').classList.remove('has-image');
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('fileInput').value = '';
}
</script>
