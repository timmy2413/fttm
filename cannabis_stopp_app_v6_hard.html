<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTTM Clean – Hard Mode</title>
<style>
:root{
  --bg:#020617; --card:#0f172a; --muted:#1e293b; --accent:#22c55e; --danger:#ef4444;
}
body{font-family:Arial, Helvetica, sans-serif;background:var(--bg);color:white;padding:16px;}
.card{background:var(--card);padding:16px;margin-top:14px;border-radius:12px;}
h1,h2,h3{margin:6px 0 10px 0}
button{padding:12px;margin:6px 6px 0 0;border:none;border-radius:10px;background:var(--accent);color:black;font-weight:800;}
button.secondary{background:#94a3b8;color:#020617}
button.danger{background:var(--danger);color:white}
.progress{background:var(--muted);border-radius:10px;height:18px;overflow:hidden;margin-top:10px;}
.progress-bar{background:var(--accent);height:100%;width:0%;}
input, textarea{width:100%;margin-top:6px;padding:10px;border-radius:8px;border:none;background:#0b1220;color:white}
small{color:#94a3b8}
.lock{position:fixed; inset:0; background:#020617; display:flex; align-items:center; justify-content:center; z-index:9999;}
.lock-inner{max-width:520px; text-align:center;}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#052e16;color:#22c55e;font-weight:700}
.row{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>

<div id="lock" class="lock">
  <div class="lock-inner">
    <h2>Warum hörst du auf?</h2>
    <textarea id="reason" placeholder="Schreibe deinen Grund. Ohne das kommst du hier nicht rein."></textarea>
    <div class="row" style="justify-content:center;margin-top:10px;">
      <button onclick="unlock()">Starten</button>
    </div>
    <p><small>Dein Grund wird lokal gespeichert und bei Cravings angezeigt.</small></p>
  </div>
</div>

<h1>🚀 FTTM Clean – Hard Mode</h1>

<div class="card">
  <h3>📅 Fortschritt</h3>
  <div id="dayCounter"></div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div id="streak" class="badge" style="margin-top:8px;">Streak: 0</div>
</div>

<div class="card">
  <h3>🎯 Tages-Aufgabe</h3>
  <div id="task"></div>
</div>

<div class="card">
  <h3>📥 Tages-Check</h3>
  <input id="mood" placeholder="Stimmung 1-10">
  <input id="craving" placeholder="Craving 1-10">
  <textarea id="notes" placeholder="Notizen"></textarea>
  <div class="row">
    <button onclick="saveDay()">Speichern</button>
    <button class="secondary" onclick="openFocus(10)">10 Min Fokus</button>
  </div>
</div>

<div class="card">
  <h3>⚠️ Craving Hilfe</h3>
  <button onclick="cravingHelp()">JETZT NICHT RAUCHEN</button>
  <p id="help"></p>
  <p><small id="reasonEcho"></small></p>
</div>

<div class="card">
  <h3>⏰ Reminder</h3>
  <p><small>Browser-Reminder (falls erlaubt). Setze feste Zeiten.</small></p>
  <div class="row">
    <button onclick="requestNotif()">Erlauben</button>
    <button class="secondary" onclick="setReminder(9)">09:00</button>
    <button class="secondary" onclick="setReminder(18)">18:00</button>
    <button class="secondary" onclick="setReminder(22)">22:00</button>
  </div>
</div>

<div class="card">
  <h3>🏆 Belohnung</h3>
  <div id="reward"></div>
</div>

<div class="card">
  <h3>📊 Verlauf</h3>
  <div id="log"></div>
  <div class="row">
    <button class="danger" onclick="relapse()">Rückfall</button>
    <button class="secondary" onclick="reset()">Reset</button>
  </div>
</div>

<script>
const K_START="start_v6";
const K_LOG="log_v6";
const K_REASON="reason_v6";
const K_STREAK="streak_v6";
const K_REMINDERS="reminders_v6";

const tasks=[
"Alles entfernen (Gras, Grinder, Kontakte)",
"Hydration + 20min Bewegung",
"Kein Alleinsein – aktiv bleiben",
"Trigger identifizieren + vermeiden",
"20–30min Sport",
"Fester Schlafplan",
"Stress minimieren",
"Routine festigen",
"30min Spaziergang",
"Kein Alkohol",
"Ziel visualisieren (5min)",
"Soziale Kontakte aktivieren",
"Leerlauf vermeiden (Planen)",
"Produktivblock (60min)",
"Selbstkontrolle testen",
"Reflexion (Warum?)",
"Zielbild stärken",
"Konsequenz halten",
"Stark bleiben",
"Fast geschafft",
"Geschafft – halten!"
];

const rewardsMap={3:"Kleine Belohnung",7:"Gönn dir etwas",14:"Stark",21:"Komplett clean"};

function init(){
 if(!localStorage.getItem(K_START)){
  localStorage.setItem(K_START,new Date().toISOString());
 }
 if(!localStorage.getItem(K_STREAK)){
  localStorage.setItem(K_STREAK,"0");
 }
 // lock handling
 const r=localStorage.getItem(K_REASON);
 if(r){
   document.getElementById('lock').style.display='none';
   document.getElementById('reasonEcho').innerText="Grund: "+r;
 }
}

function unlock(){
 const val=document.getElementById('reason').value.trim();
 if(!val) return alert("Ohne Grund kein Start.");
 localStorage.setItem(K_REASON,val);
 document.getElementById('reasonEcho').innerText="Grund: "+val;
 document.getElementById('lock').style.display='none';
}

function getDay(){
 let start=new Date(localStorage.getItem(K_START));
 return Math.floor((new Date()-start)/(1000*60*60*24))+1;
}

function update(){
 let d=getDay();
 document.getElementById("dayCounter").innerText="Tag "+d;
 document.getElementById("progressBar").style.width=Math.min(d/21*100,100)+"%";
 document.getElementById("task").innerText=tasks[d-1]||"Weiter machen!";
 document.getElementById("streak").innerText="Streak: "+localStorage.getItem(K_STREAK);
 document.getElementById("reward").innerText=rewardsMap[d]||"";
}

function saveDay(){
 let data=JSON.parse(localStorage.getItem(K_LOG)||"[]");
 data.push({
  day:getDay(),
  mood:document.getElementById("mood").value,
  craving:document.getElementById("craving").value,
  notes:document.getElementById("notes").value,
  date:new Date().toLocaleString()
 });
 localStorage.setItem(K_LOG,JSON.stringify(data));
 // increase streak once per day save (simple)
 let s=parseInt(localStorage.getItem(K_STREAK)||"0");
 localStorage.setItem(K_STREAK,String(s+1));
 load();
 update();
}

function load(){
 let data=JSON.parse(localStorage.getItem(K_LOG)||"[]");
 let out="";
 data.slice().reverse().forEach(e=>{
  out+=`<div style="border-bottom:1px solid #1e293b;padding:6px 0;">
    <b>Tag ${e.day}</b> (${e.date})<br>
    Stimmung:${e.mood} | Craving:${e.craving}<br>${e.notes}
  </div>`;
 });
 document.getElementById("log").innerHTML=out;
}

function cravingHelp(){
 const tips=[
  "10 Minuten warten – Craving fällt ab.",
  "Großes Glas Wasser + 5 Minuten raus.",
  "Kalte Dusche oder 20 Liegestütze.",
  "Ablenkung: 15 Minuten Task ausführen.",
  "Grund lesen und laut sagen."
 ];
 document.getElementById("help").innerText=tips[Math.floor(Math.random()*tips.length)];
}

function relapse(){
 if(!confirm("Rückfall bestätigen?")) return;
 // consequence: reset streak and add note
 localStorage.setItem(K_STREAK,"0");
 let data=JSON.parse(localStorage.getItem(K_LOG)||"[]");
 data.push({day:getDay(), mood:"-", craving:"-", notes:"Rückfall – Neustart", date:new Date().toLocaleString()});
 localStorage.setItem(K_LOG,JSON.stringify(data));
 // optional: shift start date to now
 localStorage.setItem(K_START,new Date().toISOString());
 load(); update();
 alert("Konsequenz: Streak 0. Neustart ab jetzt.");
}

function reset(){
 if(confirm("Alles löschen?")){
  localStorage.clear();
  location.reload();
 }
}

// Focus / lock mode
let focusTimer=null;
function openFocus(min){
 const overlay=document.createElement('div');
 overlay.className='lock';
 overlay.innerHTML=`<div class='lock-inner'>
   <h2>Fokus ${min} Minuten</h2>
   <p>Kein Scrollen. Kein Wegklicken.</p>
   <div id='count'>${min}:00</div>
 </div>`;
 document.body.appendChild(overlay);
 let total=min*60;
 focusTimer=setInterval(()=>{
   total--;
   const m=Math.floor(total/60).toString().padStart(2,'0');
   const s=(total%60).toString().padStart(2,'0');
   document.getElementById('count').innerText=m+":"+s;
   if(total<=0){
     clearInterval(focusTimer);
     overlay.remove();
     alert("Fokus beendet.");
   }
 },1000);
}

// Notifications (best effort)
function requestNotif(){
 if(!('Notification' in window)) return alert('Nicht unterstützt');
 Notification.requestPermission().then(p=>{
   alert(p==='granted' ? 'Erlaubt' : 'Nicht erlaubt');
 });
}

function setReminder(hour){
 if(Notification.permission!=='granted') return alert('Erst erlauben');
 let list=JSON.parse(localStorage.getItem(K_REMINDERS)||"[]");
 if(!list.includes(hour)) list.push(hour);
 localStorage.setItem(K_REMINDERS,JSON.stringify(list));
 alert('Reminder gesetzt: '+hour+':00');
}

function tickReminder(){
 if(Notification.permission!=='granted') return;
 let now=new Date();
 let h=now.getHours(), m=now.getMinutes();
 if(m!==0) return; // fire on the hour
 let list=JSON.parse(localStorage.getItem(K_REMINDERS)||"[]");
 if(list.includes(h)){
   new Notification('Clean bleiben', {body:'Kurz checken, nicht nachgeben.'});
 }
}

setInterval(tickReminder, 60*1000);

init();
update();
load();
</script>

</body>
</html>
