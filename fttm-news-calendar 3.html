<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FTTM — News Kalender</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FTTM News">
<link rel="apple-touch-icon" id="pwa-icon">
<script>
(function(){
  const c=document.createElement('canvas');c.width=c.height=512;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#04070d';ctx.fillRect(0,0,512,512);
  const bg=ctx.createLinearGradient(0,0,512,512);
  bg.addColorStop(0,'rgba(0,240,255,0.15)');bg.addColorStop(1,'rgba(0,255,157,0.08)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,512,512);
  ctx.strokeStyle='rgba(0,240,255,0.4)';ctx.lineWidth=8;ctx.strokeRect(20,20,472,472);
  const tg=ctx.createLinearGradient(80,0,430,0);
  tg.addColorStop(0,'#00f0ff');tg.addColorStop(1,'#00ff9d');
  ctx.fillStyle=tg;ctx.font='bold 130px Arial Black,Arial';ctx.textAlign='center';
  ctx.fillText('FTTM',256,200);
  ctx.fillStyle='#2e4d6a';ctx.font='bold 38px Arial';
  ctx.fillText('NEWS KALENDER',256,270);
  [[155,'#00ff9d'],[256,'#ffe600'],[357,'#ff2850']].forEach(([x,col])=>{
    ctx.beginPath();ctx.arc(x,390,26,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  });
  document.getElementById('pwa-icon').href=c.toDataURL('image/png');
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&family=Outfit:wght@400;600;700;900&display=swap');
:root{
  --bg:#04070d;--s1:#070d16;--s2:#0b1320;--b1:#13243a;--b2:#1a3050;
  --c:#00f0ff;--g:#00ff9d;--r:#ff2850;--y:#ffe600;--p:#c47fff;--o:#ff7c2a;
  --tx:#cce4ff;--mu:#2e4d6a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh;
  background-image:linear-gradient(rgba(0,240,255,.015) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,240,255,.015) 1px,transparent 1px);
  background-size:44px 44px;padding-bottom:40px;}
.hdr{background:var(--s1);border-bottom:1px solid var(--b1);padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue';font-size:28px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--c),var(--g));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-sub{font-family:'JetBrains Mono';font-size:9px;color:var(--mu);letter-spacing:2px;}
.hdr-right{text-align:right;}
.hdr-time{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--tx);}
.hdr-date{font-family:'JetBrains Mono';font-size:9px;color:var(--c);}
.wrap{padding:14px;}
.ampel{border-radius:18px;padding:20px;margin-bottom:14px;border:2px solid;
  text-align:center;position:relative;overflow:hidden;transition:all .4s;}
.ampel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ampel.green{border-color:var(--g);background:rgba(0,255,157,.06);}
.ampel.green::before{background:linear-gradient(90deg,var(--g),var(--c));}
.ampel.yellow{border-color:var(--y);background:rgba(255,230,0,.05);}
.ampel.yellow::before{background:linear-gradient(90deg,var(--y),var(--o));}
.ampel.red{border-color:var(--r);background:rgba(255,40,80,.07);}
.ampel.red::before{background:linear-gradient(90deg,var(--r),var(--o));}
.ampel.loading{border-color:var(--mu);background:var(--s1);}
.ampel.loading::before{background:linear-gradient(90deg,var(--mu),transparent);}
.amp-icon{font-size:42px;margin-bottom:6px;}
.amp-label{font-family:'Bebas Neue';font-size:32px;letter-spacing:4px;margin-bottom:4px;}
.amp-msg{font-family:'JetBrains Mono';font-size:10px;color:var(--mu);line-height:1.6;}
.ampel.green .amp-msg,.ampel.yellow .amp-msg,.ampel.red .amp-msg{color:var(--tx);}
.amp-cd{font-family:'Bebas Neue';font-size:24px;letter-spacing:3px;margin-top:8px;}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;
  padding:14px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.cc::before{background:linear-gradient(90deg,var(--c),transparent);}
.cr::before{background:linear-gradient(90deg,var(--r),transparent);}
.cy::before{background:linear-gradient(90deg,var(--y),transparent);}
.cg::before{background:linear-gradient(90deg,var(--g),transparent);}
.ct{font-family:'JetBrains Mono';font-size:9px;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:10px;color:var(--mu);display:flex;align-items:center;gap:6px;}
.ct::before{content:'//';color:var(--b2);}
.ni{background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  padding:13px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;}
.ni:last-child{margin-bottom:0;}
.ni.past{opacity:.35;}
.ni.nogo{border-color:rgba(255,40,80,.5);background:rgba(255,40,80,.06);}
.ni.warn{border-color:rgba(255,230,0,.4);background:rgba(255,230,0,.04);}
.ni-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.ni-dot.red{background:var(--r);box-shadow:0 0 10px var(--r);}
.ni-dot.yellow{background:var(--y);box-shadow:0 0 8px var(--y);}
.ni-dot.green{background:var(--g);}
.ni-body{flex:1;}
.ni-time{font-family:'JetBrains Mono';font-size:9px;color:var(--mu);margin-bottom:3px;}
.ni-name{font-family:'Outfit';font-size:14px;font-weight:700;margin-bottom:4px;}
.ni-badge{font-family:'JetBrains Mono';font-size:9px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:5px;}
.ni-badge.red{background:rgba(255,40,80,.15);color:var(--r);}
.ni-badge.yellow{background:rgba(255,230,0,.12);color:var(--y);}
.ni-badge.green{background:rgba(0,255,157,.1);color:var(--g);}
.ni-rule{font-family:'JetBrains Mono';font-size:9px;line-height:1.5;padding:6px 8px;border-radius:6px;margin-top:4px;}
.ni-rule.red{background:rgba(255,40,80,.08);color:var(--r);}
.ni-rule.yellow{background:rgba(255,230,0,.07);color:var(--y);}
.ni-cd{font-family:'Bebas Neue';font-size:15px;color:var(--c);margin-top:5px;letter-spacing:1px;}
.api-section{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:12px;}
.api-section label{font-family:'JetBrains Mono';font-size:9px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px;}
.api-section input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--tx);padding:11px 13px;font-family:'JetBrains Mono';font-size:12px;outline:none;}
.api-section input:focus{border-color:var(--c);}
.tabs{display:flex;gap:8px;margin-bottom:12px;}
.tab{flex:1;padding:11px;border-radius:10px;border:2px solid var(--b1);background:var(--s1);
  font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;cursor:pointer;
  text-align:center;transition:all .18s;color:var(--mu);}
.tab.active{border-color:var(--c);color:var(--c);background:rgba(0,240,255,.05);}
.refresh-btn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--b2);
  background:var(--s2);color:var(--c);font-family:'Bebas Neue';font-size:16px;
  letter-spacing:2px;cursor:pointer;margin-bottom:12px;transition:all .18s;}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed;}
.empty{text-align:center;padding:24px;font-family:'JetBrains Mono';font-size:10px;color:var(--mu);line-height:2;}
.leg{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.leg:last-child{margin-bottom:0;}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.leg-text{font-family:'JetBrains Mono';font-size:10px;color:var(--mu);line-height:1.5;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="logo">FTTM</div>
    <div class="hdr-sub">News Kalender · XAUUSD</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-date" id="hdr-date"></div>
    <div class="hdr-time" id="hdr-time"></div>
  </div>
</div>

<div class="wrap">
  <div class="ampel loading" id="ampel">
    <div class="amp-icon" id="amp-icon">⏳</div>
    <div class="amp-label" id="amp-label">LADEN...</div>
    <div class="amp-msg" id="amp-msg">News werden abgerufen</div>
    <div class="amp-cd" id="amp-cd"></div>
  </div>

  <div class="api-section">
    <label>Gemini API Key</label>
    <input type="password" id="apikey" placeholder="API Key eingeben..." oninput="saveKey()">
    <div style="font-family:'JetBrains Mono';font-size:9px;color:var(--mu);margin-top:5px;">→ aistudio.google.com · Kostenlos · Wird lokal gespeichert</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-today" onclick="switchTab('today')">📅 HEUTE</div>
    <div class="tab" id="tab-week" onclick="switchTab('week')">📆 WOCHE</div>
  </div>

  <button class="refresh-btn" id="refresh-btn" onclick="loadNews()">🔄 AKTUALISIEREN</button>

  <div id="news-list"></div>

  <div class="card cc">
    <div class="ct" style="color:var(--c)">Legende</div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--r);box-shadow:0 0 8px var(--r);"></div>
      <div class="leg-text"><strong style="color:var(--r)">🔴 NO-GO (±30 Min)</strong><br>NFP, CPI, Fed Zinsentscheid, Powell Rede</div>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--y);box-shadow:0 0 6px var(--y);"></div>
      <div class="leg-text"><strong style="color:var(--y)">🟡 VORSICHT (±15 Min)</strong><br>PPI, Retail Sales, GDP, ADP, FOMC Minutes</div>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--g);"></div>
      <div class="leg-text"><strong style="color:var(--g)">🟢 OK</strong><br>Geringer Einfluss auf XAUUSD</div>
    </div>
  </div>
</div>

<script>
'use strict';
const S={g:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},s:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
const RED_KW=['non-farm','nonfarm','nfp','consumer price index','cpi','core cpi','fed rate','interest rate decision','fomc statement','powell','fed chair','federal reserve chair','unemployment rate'];
const YELLOW_KW=['ppi','producer price','retail sales','gdp','gross domestic','fomc minutes','adp','jolts','core pce','pce price','durable goods','ism manufacturing','ism services','trade balance'];
let currentTab='today', newsData=[];

function classify(name){
  const n=(name||'').toLowerCase();
  if(RED_KW.some(k=>n.includes(k))) return 'red';
  if(YELLOW_KW.some(k=>n.includes(k))) return 'yellow';
  return 'green';
}

window.addEventListener('DOMContentLoaded',()=>{
  const saved=S.g('fttm_apikey','');
  if(saved) document.getElementById('apikey').value=saved;
  updateClock();
  setInterval(updateClock,1000);
  setInterval(updateAmpel,15000);
  if(saved) loadNews();
  else{
    setAmpel('loading','⚙️','API KEY FEHLT','Gemini API Key eingeben','');
    document.getElementById('news-list').innerHTML='<div class="empty">API Key eingeben und App neu laden.</div>';
  }
});

function saveKey(){
  const k=document.getElementById('apikey').value.trim();
  if(k) S.s('fttm_apikey',k);
}

function updateClock(){
  const now=new Date();
  document.getElementById('hdr-time').textContent=now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('hdr-date').textContent=now.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  updateCountdowns();
}

async function loadNews(){
  const apiKey=document.getElementById('apikey').value.trim();
  if(!apiKey){alert('Bitte API Key eingeben!');return;}
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true; btn.textContent='⏳ Laden...';
  setAmpel('loading','⏳','LADEN...','News werden abgerufen...','');
  document.getElementById('news-list').innerHTML='<div class="empty">⏳ Gemini sucht aktuelle News...</div>';

  const now=new Date();
  const todayStr=now.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  const isWeek=currentTab==='week';

  const prompt=isWeek
    ? `Today is ${todayStr}. Search the economic calendar and list ALL USD economic news events for this entire current week (Monday to Friday). For EACH event provide: name, date in DD.MM.YYYY format, exact time in MT5 server time (GMT+3 in summer/daylight saving), impact (High/Medium/Low). Include ALL events: NFP, CPI, Fed decisions, PPI, Retail Sales, GDP, ADP, FOMC, Powell speeches, ISM, Jobless Claims, Durable Goods, Trade Balance and everything else USD. Reply ONLY with a valid JSON array. No markdown, no text, no explanation. Example: [{"name":"NFP","date":"04.04.2026","time":"15:30","impact":"High"},{"name":"ISM Services","date":"07.04.2026","time":"16:00","impact":"Medium"}]`
    : `Today is ${todayStr}. Search the economic calendar and list ALL USD economic news events scheduled for today only. For EACH event provide: name, date in DD.MM.YYYY format, exact time in MT5 server time (GMT+3 in summer/daylight saving), impact (High/Medium/Low). If there are no events today, return an empty array []. Reply ONLY with a valid JSON array. No markdown, no text, no explanation. Example: [{"name":"CPI","date":"${now.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}","time":"15:30","impact":"High"}]`;

  try{
    const resp=await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+apiKey,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({
         contents:[{parts:[{text:prompt}]}],
         tools:[{type:'web_search_20250305',name:'web_search'}],
         generationConfig:{temperature:0.1,maxOutputTokens:2000}
       })}
    );
    const d=await resp.json();
    if(d.error) throw new Error(d.error.message);
    const raw=d.candidates[0].content.parts.filter(p=>p.text).map(p=>p.text).join('').trim();
    let events=[];
    try{
      const clean=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      const s=clean.indexOf('['), e=clean.lastIndexOf(']');
      if(s!==-1&&e!==-1) events=JSON.parse(clean.substring(s,e+1));
    }catch(e){console.log('parse fail',raw.substring(0,300));}
    newsData=events;
    S.s('fttm_news_cache',{data:events,tab:currentTab,ts:Date.now()});
    renderNews(events);
    updateAmpel();
  }catch(e){
    console.log('fail',e);
    const cache=S.g('fttm_news_cache',null);
    if(cache&&cache.tab===currentTab&&(Date.now()-cache.ts)<3600000){
      newsData=cache.data;
      renderNews(cache.data);
      updateAmpel();
      const el=document.getElementById('news-list');
      el.innerHTML='<div style="font-family:\'JetBrains Mono\';font-size:9px;color:var(--mu);padding:8px 0;margin-bottom:8px;">⚠ Cache · '+new Date(cache.ts).toLocaleTimeString('de-DE')+'</div>'+el.innerHTML;
    }else{
      setAmpel('loading','⚠️','FEHLER','Laden fehlgeschlagen. Bitte aktualisieren.','');
      document.getElementById('news-list').innerHTML='<div class="empty">⚠ Fehler beim Laden.<br>Verbindung prüfen und nochmal versuchen.</div>';
    }
  }
  btn.disabled=false; btn.textContent='🔄 AKTUALISIEREN';
}

function renderNews(events){
  const listEl=document.getElementById('news-list');
  if(!events.length){listEl.innerHTML='<div class="empty">Keine USD News '+(currentTab==='today'?'heute':'diese Woche')+' gefunden.</div>';return;}
  const now=new Date();
  const sorted=[...events].sort((a,b)=>{const ta=pt(a.date,a.time),tb=pt(b.date,b.time);if(!ta)return 1;if(!tb)return -1;return ta-tb;});
  const groups={};
  sorted.forEach(e=>{const k=e.date||'?';if(!groups[k])groups[k]=[];groups[k].push(e);});
  let html='';
  Object.keys(groups).sort((a,b)=>pd(a)-pd(b)).forEach(date=>{
    const hasRed=groups[date].some(e=>classify(e.name)==='red');
    const hasYellow=groups[date].some(e=>classify(e.name)==='yellow');
    const cls=hasRed?'cr':hasYellow?'cy':'cg';
    const clrVar=hasRed?'var(--r)':hasYellow?'var(--y)':'var(--g)';
    html+='<div class="card '+cls+'"><div class="ct" style="color:'+clrVar+'">'+fmtDate(date)+'</div>';
    groups[date].forEach(e=>{
      const t=pt(e.date,e.time);
      const minsAway=t?(t-now)/60000:9999;
      const isPast=minsAway<-30;
      const ecls=classify(e.name);
      const isNogo=ecls==='red'&&Math.abs(minsAway)<=30;
      const isWarn=ecls==='yellow'&&Math.abs(minsAway)<=15;
      html+='<div class="ni'+(isPast?' past':'')+(isNogo?' nogo':'')+(isWarn?' warn':'')+'">';
      html+='<div class="ni-dot '+ecls+'"></div>';
      html+='<div class="ni-body">';
      html+='<div class="ni-time">'+(e.time||'?')+' MT5 · USD</div>';
      html+='<div class="ni-name">'+(e.name||'?')+'</div>';
      html+='<span class="ni-badge '+ecls+'">'+(e.impact||'Low').toUpperCase()+'</span>';
      if(ecls==='red'&&!isPast) html+='<div class="ni-rule red">🔴 NO-GO: 30 Min vorher & nachher kein Trade</div>';
      else if(ecls==='yellow'&&!isPast) html+='<div class="ni-rule yellow">🟡 Vorsicht: Kein neuer Trade 15 Min vorher</div>';
      if(!isPast&&t&&minsAway>0&&minsAway<180) html+='<div class="ni-cd" id="cd-'+t.getTime()+'">in '+fmtCd(minsAway)+'</div>';
      else if(isNogo||isWarn) html+='<div class="ni-cd" style="color:var(--r)">⚠ LÄUFT GERADE</div>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  listEl.innerHTML=html;
}

function updateAmpel(){
  if(!newsData.length){setAmpel('green','🟢','BEREIT ZU TRADEN','Keine News geladen oder keine USD Events.','');return;}
  const now=new Date();
  const rel=newsData.map(e=>({...e,t:pt(e.date,e.time),cls:classify(e.name)})).filter(e=>e.t&&e.cls!=='green').sort((a,b)=>a.t-b.t);
  if(!rel.length){setAmpel('green','🟢','BEREIT ZU TRADEN','Keine hochriskanten News.','');return;}
  const inNogo=rel.find(e=>e.cls==='red'&&Math.abs((e.t-now)/60000)<=30);
  if(inNogo){const m=(inNogo.t-now)/60000;setAmpel('red','🔴','NO-GO ZONE',inNogo.name+(m>0?' in '+Math.round(m)+' Min':' läuft gerade')+' — kein Trade!',m>0?fmtCd(m):'⚠ JETZT');updateCountdowns();return;}
  const inWarn=rel.find(e=>e.cls==='yellow'&&Math.abs((e.t-now)/60000)<=15);
  if(inWarn){const m=(inWarn.t-now)/60000;setAmpel('yellow','🟡','VORSICHT',inWarn.name+' — kein neuer Trade jetzt',m>0?fmtCd(m):'⚠ JETZT');updateCountdowns();return;}
  const next=rel.find(e=>(e.t-now)/60000>0);
  if(!next){setAmpel('green','🟢','BEREIT ZU TRADEN','Alle relevanten News für heute vorbei.','');return;}
  const m=(next.t-now)/60000;
  if(next.cls==='red'&&m<=60) setAmpel('yellow','🟡','BALD NO-GO',next.name+' in '+Math.round(m)+' Min — Trade vorbereiten',fmtCd(m));
  else setAmpel('green','🟢','BEREIT ZU TRADEN','Nächste High-Impact News: '+next.name+' in '+Math.round(m)+' Min','');
  updateCountdowns();
}

function updateCountdowns(){
  const now=new Date();
  newsData.forEach(e=>{
    const t=pt(e.date,e.time);if(!t)return;
    const m=(t-now)/60000;
    const el=document.getElementById('cd-'+t.getTime());if(!el)return;
    if(m<=0){el.textContent='⚠ LÄUFT GERADE';el.style.color='var(--r)';}
    else if(m<180) el.textContent='in '+fmtCd(m);
  });
}

function setAmpel(cls,icon,label,msg,cd){
  document.getElementById('ampel').className='ampel '+cls;
  document.getElementById('amp-icon').textContent=icon;
  document.getElementById('amp-label').textContent=label;
  document.getElementById('amp-msg').textContent=msg;
  document.getElementById('amp-cd').textContent=cd;
}

function pt(dateStr,timeStr){
  if(!dateStr||!timeStr)return null;
  try{const[d,m,y]=dateStr.split('.');const[h,min]=(timeStr||'00:00').split(':');return new Date(+y,+m-1,+d,+h,+min||0);}catch(e){return null;}
}
function pd(str){try{const[d,m,y]=str.split('.');return new Date(+y,+m-1,+d);}catch(e){return new Date(0);}}
function fmtDate(str){
  try{
    const d=pd(str);const today=new Date();const tom=new Date(today);tom.setDate(today.getDate()+1);
    if(d.toDateString()===today.toDateString()) return '📅 Heute · '+str;
    if(d.toDateString()===tom.toDateString()) return '📆 Morgen · '+str;
    return d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'});
  }catch(e){return str;}
}
function fmtCd(mins){const m=Math.floor(Math.abs(mins));const s=Math.floor((Math.abs(mins)*60)%60);return m+'min '+String(s).padStart(2,'0')+'sek';}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-today').classList.toggle('active',tab==='today');
  document.getElementById('tab-week').classList.toggle('active',tab==='week');
  const cache=S.g('fttm_news_cache',null);
  if(cache&&cache.tab===tab&&(Date.now()-cache.ts)<3600000){newsData=cache.data;renderNews(cache.data);updateAmpel();}
  else loadNews();
}
</script>
